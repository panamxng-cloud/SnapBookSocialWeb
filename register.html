<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapBook | Crear cuenta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            background: #0a0a12;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            pointer-events: none;
        }
        .blob-1 { width: 300px; height: 300px; background: #6c63ff; top: -60px; right: -60px; animation: float1 9s ease-in-out infinite; }
        .blob-2 { width: 260px; height: 260px; background: #ff6584; bottom: -60px; left: -60px; animation: float2 11s ease-in-out infinite; }
        .blob-3 { width: 200px; height: 200px; background: #1877f2; top: 40%; right: -40px; animation: float3 8s ease-in-out infinite; }
        @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,20px)} }
        @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(25px,-15px)} }
        @keyframes float3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-15px,20px)} }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0;
        }

        .card {
            width: 100%; max-width: 400px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 36px 28px 32px;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            position: relative; z-index: 1;
            animation: slideUp 0.5s cubic-bezier(0.4,0,0.2,1) forwards;
        }
        @keyframes slideUp { from{opacity:0;transform:translateY(32px)} to{opacity:1;transform:translateY(0)} }

        /* LOGO */
        .logo-wrap { text-align: center; margin-bottom: 24px; }
        .logo { font-size: 30px; font-weight: 800; letter-spacing: -1px; background: linear-gradient(135deg,#1877f2,#ff6584); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; display:inline-block; }

        /* AVATAR PICKER */
        .avatar-picker {
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 22px; gap: 10px;
        }
        .avatar-ring {
            width: 88px; height: 88px; border-radius: 50%;
            border: 2.5px dashed rgba(255,101,132,0.5);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
            background: rgba(255,101,132,0.06);
        }
        .avatar-ring:hover { border-color: rgba(255,101,132,0.8); transform: scale(1.04); }
        .avatar-ring img { width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 50%; }
        .avatar-ring .camera-icon { color: rgba(255,101,132,0.7); font-size: 24px; position: absolute; transition: color 0.2s; }
        .avatar-ring.has-img .camera-icon { display: none; }
        .avatar-ring.has-img img { display: block; }
        .avatar-ring.has-img { border: 2.5px solid #43e97b; box-shadow: 0 0 0 4px rgba(67,233,123,0.15); }
        .avatar-ring.error-ring { border-color: #ff6584; box-shadow: 0 0 0 4px rgba(255,101,132,0.2); animation: shake 0.4s ease; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)} 80%{transform:translateX(-3px)} }
        .avatar-required-badge {
            position: absolute; top: -2px; right: -2px;
            width: 20px; height: 20px; background: #ff6584; border-radius: 50%;
            border: 2px solid #0a0a12;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: white; font-weight: 800;
        }
        .avatar-ring.has-img .avatar-required-badge { display: none; }
        .avatar-hint { font-size: 12px; color: rgba(255,101,132,0.8); font-weight: 700; }
        .avatar-hint.ok { color: #43e97b; }

        /* TITLE */
        .card-title { color: white; font-size: 20px; font-weight: 800; margin-bottom: 4px; }
        .card-sub { color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 22px; }

        /* FORM */
        .field { margin-bottom: 12px; }
        .field label { display: block; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .input-wrap { position: relative; }
        .input-wrap i.field-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.25); font-size: 14px; pointer-events: none; }
        .input-wrap .eye-btn { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3); font-size: 14px; cursor: pointer; background: none; border: none; padding: 4px; }
        .field input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 12px 14px 12px 42px;
            color: white;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        .field input::placeholder { color: rgba(255,255,255,0.2); }
        .field input:focus { border-color: rgba(24,119,242,0.5); background: rgba(255,255,255,0.07); }
        .field input.has-eye { padding-right: 42px; }

        /* PASSWORD STRENGTH */
        .strength-bar { display: flex; gap: 4px; margin-top: 7px; }
        .strength-seg { flex: 1; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.1); transition: background 0.3s; }
        .strength-label { font-size: 11px; margin-top: 4px; font-weight: 600; color: rgba(255,255,255,0.3); transition: color 0.3s; }

        /* TERMS */
        .terms-row {
            display: flex; align-items: flex-start; gap: 10px;
            margin: 16px 0;
        }
        .terms-row input[type="checkbox"] { display: none; }
        .custom-check {
            width: 20px; height: 20px; flex-shrink: 0;
            border: 1.5px solid rgba(255,255,255,0.2);
            border-radius: 6px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; margin-top: 1px;
        }
        .custom-check.checked { background: #1877f2; border-color: #1877f2; }
        .custom-check i { color: white; font-size: 11px; display: none; }
        .custom-check.checked i { display: block; }
        .terms-text { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.5; }
        .terms-text a { color: #1877f2; font-weight: 600; text-decoration: none; }

        /* ERROR */
        .error-msg {
            background: rgba(255,101,132,0.12);
            border: 1px solid rgba(255,101,132,0.25);
            border-radius: 12px;
            padding: 10px 14px;
            color: #ff8fa3;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 14px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .error-msg.visible { display: flex; }

        /* SUCCESS */
        .success-msg {
            background: rgba(67,233,123,0.1);
            border: 1px solid rgba(67,233,123,0.2);
            border-radius: 12px;
            padding: 10px 14px;
            color: #43e97b;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 14px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .success-msg.visible { display: flex; }

        /* SUBMIT */
        .submit-btn {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #6c63ff, #ff6584);
            color: white;
            font-size: 15px;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            position: relative; overflow: hidden;
        }
        .submit-btn::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,transparent,rgba(255,255,255,0.12)); }
        .submit-btn:active { transform: scale(0.97); }
        .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .submit-btn .spinner { display: none; width: 20px; height: 20px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
        .submit-btn.loading .btn-text { display: none; }
        .submit-btn.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* DIVIDER */
        .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
        .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.07); }
        .divider-text { color: rgba(255,255,255,0.25); font-size: 12px; font-weight: 600; }

        /* GOOGLE */
        .google-btn {
            width: 100%; padding: 12px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: white; font-size: 14px; font-weight: 700;
            font-family: inherit; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: all 0.2s;
        }
        .google-btn:active { transform: scale(0.97); background: rgba(255,255,255,0.08); }
        .google-icon { width: 18px; height: 18px; }

        /* FOOTER */
        .card-footer { text-align: center; margin-top: 22px; color: rgba(255,255,255,0.3); font-size: 13px; }
        .card-footer a { color: #6c63ff; font-weight: 700; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="card">
        <div class="logo-wrap">
            <div class="logo">SnapBook</div>
        </div>

        <!-- AVATAR OBLIGATORIO -->
        <div class="avatar-picker">
            <div class="avatar-ring" id="avatar-ring">
                <i class="fa-solid fa-camera camera-icon"></i>
                <img id="avatar-preview" src="" alt="">
                <div class="avatar-required-badge">!</div>
                <input type="file" id="avatar-file" accept="image/*" style="display:none">
            </div>
            <div class="avatar-hint" id="avatar-hint">Foto de perfil obligatoria</div>
        </div>

        <div class="card-title">Crea tu cuenta</div>
        <div class="card-sub">Únete a SnapBook hoy mismo</div>

        <div class="error-msg" id="error-msg">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span id="error-text"></span>
        </div>
        <div class="success-msg" id="success-msg">
            <i class="fa-solid fa-circle-check"></i>
            <span id="success-text">¡Cuenta creada!</span>
        </div>

        <div class="field">
            <label>Nombre completo</label>
            <div class="input-wrap">
                <i class="fa-solid fa-user field-icon"></i>
                <input type="text" id="fullname" placeholder="Tu nombre" autocomplete="name">
            </div>
        </div>

        <div class="field">
            <label>Correo electrónico</label>
            <div class="input-wrap">
                <i class="fa-solid fa-envelope field-icon"></i>
                <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email">
            </div>
        </div>

        <div class="field">
            <label>Contraseña</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock field-icon"></i>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" class="has-eye" autocomplete="new-password">
                <button class="eye-btn" id="eye-btn" tabindex="-1">
                    <i class="fa-regular fa-eye" id="eye-icon"></i>
                </button>
            </div>
            <div class="strength-bar">
                <div class="strength-seg" id="s1"></div>
                <div class="strength-seg" id="s2"></div>
                <div class="strength-seg" id="s3"></div>
                <div class="strength-seg" id="s4"></div>
            </div>
            <div class="strength-label" id="strength-label"></div>
        </div>

        <div class="field">
            <label>Confirmar contraseña</label>
            <div class="input-wrap">
                <i class="fa-solid fa-shield-halved field-icon"></i>
                <input type="password" id="confirm-password" placeholder="Repite tu contraseña" class="has-eye" autocomplete="new-password">
                <button class="eye-btn" id="eye-btn2" tabindex="-1">
                    <i class="fa-regular fa-eye" id="eye-icon2"></i>
                </button>
            </div>
        </div>

        <div class="terms-row">
            <div class="custom-check" id="terms-check">
                <i class="fa-solid fa-check"></i>
            </div>
            <div class="terms-text">
                Acepto los <a href="#">Términos de servicio</a> y la <a href="#">Política de privacidad</a> de SnapBook.
            </div>
        </div>

        <button class="submit-btn" id="register-btn">
            <span class="btn-text">Crear cuenta gratis</span>
            <div class="spinner"></div>
        </button>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">O regístrate con</div>
            <div class="divider-line"></div>
        </div>

        <button class="google-btn" id="google-btn">
            <svg class="google-icon" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.6 32.6 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/>
                <path fill="#FF3D00" d="m6.3 14.7 6.6 4.8C14.5 16 19 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
                <path fill="#4CAF50" d="M24 44c5.2 0 9.8-1.9 13.4-5.1l-6.2-5.2C29.2 35.3 26.7 36 24 36c-5.2 0-9.5-3.3-11.2-8l-6.5 5C9.7 39.6 16.3 44 24 44z"/>
                <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.2 5.2C37 38 44 33 44 24c0-1.3-.1-2.7-.4-3.9z"/>
            </svg>
            Continuar con Google
        </button>

        <div class="card-footer">
            ¿Ya tienes cuenta? <a href="index.html">Iniciar sesión</a>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import {
            onAuthStateChanged,
            createUserWithEmailAndPassword,
            updateProfile,
            GoogleAuthProvider,
            signInWithPopup
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { ref as dRef, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        // ── Supabase Storage ──
        import { uploadAvatar } from './supabase-config.js';
        import { logNuevoUsuario } from './sheetdb-config.js';

        let registrando = false;
        onAuthStateChanged(auth, u => { if (u && !registrando) location.href = 'Home.html'; });

        // Avatar preview
        let avatarFile = null;
        const ring = document.getElementById('avatar-ring');
        const preview = document.getElementById('avatar-preview');
        const fileInput = document.getElementById('avatar-file');
        ring.onclick = () => fileInput.click();
        fileInput.onchange = e => {
            avatarFile = e.target.files[0];
            if (!avatarFile) return;
            const reader = new FileReader();
            reader.onload = ev => {
                preview.src = ev.target.result;
                ring.classList.add('has-img');
                ring.classList.remove('error-ring');
                const hint = document.getElementById('avatar-hint');
                hint.textContent = '✓ Foto agregada';
                hint.classList.add('ok');
            };
            reader.readAsDataURL(avatarFile);
        };

        // Show/hide password
        function setupEye(btnId, inputId, iconId) {
            document.getElementById(btnId).onclick = () => {
                const inp = document.getElementById(inputId);
                const show = inp.type === 'password';
                inp.type = show ? 'text' : 'password';
                document.getElementById(iconId).className = show ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
            };
        }
        setupEye('eye-btn', 'password', 'eye-icon');
        setupEye('eye-btn2', 'confirm-password', 'eye-icon2');

        // Password strength
        const passInput = document.getElementById('password');
        passInput.addEventListener('input', () => {
            const val = passInput.value;
            let score = 0;
            if (val.length >= 6) score++;
            if (val.length >= 10) score++;
            if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;
            const colors = ['#e74c3c','#f39c12','#1877f2','#43e97b'];
            const labels = ['','Débil','Media','Fuerte','Muy fuerte'];
            for (let i = 1; i <= 4; i++) {
                const seg = document.getElementById('s'+i);
                seg.style.background = i <= score ? colors[score-1] : 'rgba(255,255,255,0.1)';
            }
            document.getElementById('strength-label').textContent = val ? labels[score] || 'Débil' : '';
            document.getElementById('strength-label').style.color = val ? colors[Math.max(0,score-1)] : 'rgba(255,255,255,0.3)';
        });

        // Terms toggle
        let termsAccepted = false;
        const termsCheck = document.getElementById('terms-check');
        termsCheck.onclick = () => {
            termsAccepted = !termsAccepted;
            termsCheck.classList.toggle('checked', termsAccepted);
        };

        // Error / success
        function showError(msg) {
            const el = document.getElementById('error-msg');
            document.getElementById('error-text').textContent = msg;
            el.classList.add('visible');
            document.getElementById('success-msg').classList.remove('visible');
        }
        function showSuccess(msg) {
            const el = document.getElementById('success-msg');
            document.getElementById('success-text').textContent = msg;
            el.classList.add('visible');
            document.getElementById('error-msg').classList.remove('visible');
        }
        function hideMessages() {
            document.getElementById('error-msg').classList.remove('visible');
            document.getElementById('success-msg').classList.remove('visible');
        }

        function getErrorMsg(code) {
            const map = {
                'auth/email-already-in-use': 'Ese correo ya está registrado.',
                'auth/invalid-email': 'El correo no es válido.',
                'auth/weak-password': 'La contraseña es demasiado débil (mínimo 6 caracteres).',
                'auth/network-request-failed': 'Sin conexión a internet.',
            };
            return map[code] || 'Error al registrar. Intenta de nuevo.';
        }

        // Save user to DB helper
        async function saveUserToDB(user, name, photoURL) {
            await set(dRef(db, `usuarios/${user.uid}`), {
                nombre: name || user.displayName || 'Usuario',
                email: user.email || '',
                photoURL: photoURL || user.photoURL || '',
                createdAt: Date.now()
            });
        }

        // Register
        const registerBtn = document.getElementById('register-btn');
        registerBtn.onclick = async () => {
            hideMessages();
            const name = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (!avatarFile) {
                const ring = document.getElementById('avatar-ring');
                ring.classList.add('error-ring');
                setTimeout(() => ring.classList.remove('error-ring'), 600);
                showError('La foto de perfil es obligatoria.');
                ring.scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }
            if (!name) { showError('Escribe tu nombre completo.'); return; }
            if (!email) { showError('Escribe tu correo electrónico.'); return; }
            if (!password) { showError('Escribe una contraseña.'); return; }
            if (password.length < 6) { showError('La contraseña debe tener al menos 6 caracteres.'); return; }
            if (password !== confirm) { showError('Las contraseñas no coinciden.'); return; }
            if (!termsAccepted) { showError('Debes aceptar los términos para continuar.'); return; }

            registerBtn.classList.add('loading');
            registerBtn.disabled = true;
            registrando = true;

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                let photoURL = '';

                // Subir avatar si seleccionó uno
                if (avatarFile) {
                    try {
                        photoURL = await uploadAvatar(cred.user.uid, avatarFile);
                    } catch(e) {
                        console.error('Error subiendo avatar:', e.message);
                    }
                }

                await updateProfile(cred.user, { displayName: name, photoURL: photoURL || null });
                await saveUserToDB(cred.user, name, photoURL);

                showSuccess('¡Cuenta creada! Redirigiendo...');
                setTimeout(() => location.href = 'Home.html', 1200);
            } catch (err) {
                registrando = false;
                registerBtn.classList.remove('loading');
                registerBtn.disabled = false;
                showError(getErrorMsg(err.code));
            }
        };

        // Google register
        document.getElementById('google-btn').onclick = async () => {
            hideMessages();
            try {
                const provider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                // Nombre de Google; si viene vacío, usar parte del correo antes del @
                const nombre = user.displayName || user.email.split('@')[0];
                const photo  = user.photoURL || '';
                // Solo crear perfil si el usuario no existía antes
                const snap = await get(dRef(db, `usuarios/${user.uid}`));
                if (!snap.exists()) {
                    await saveUserToDB(user, nombre, photo);
                }
                location.href = 'Home.html';
            } catch(err) {
                if (err.code !== 'auth/popup-closed-by-user') showError(getErrorMsg(err.code));
            }
        };
    </script>
</body>
</html>
