<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapBook | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#f0f2f5;--surface:#fff;--surface2:#f0f2f5;--surface3:#e4e6eb;
            --border:#dde1e7;--accent:#1877f2;--accent2:#ff6584;
            --text:#050505;--text-muted:#65676b;
            --card-shadow:0 2px 12px rgba(0,0,0,0.08);
            --header-bg:rgba(255,255,255,0.97);
        }
        [data-theme="dark"]{
            --bg:#0f0f13;--surface:#1a1a24;--surface2:#22222e;--surface3:#2a2a38;
            --border:rgba(255,255,255,0.07);--accent:#6c63ff;--accent2:#ff6584;
            --text:#f0f0f5;--text-muted:#7a7a9a;
            --card-shadow:0 4px 24px rgba(0,0,0,0.4);
            --header-bg:rgba(15,15,19,0.97);
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);min-height:100vh;padding-bottom:96px;}

        /* HEADER */
        .header{position:sticky;top:0;z-index:100;background:var(--header-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
        .logo{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .header-actions{display:flex;gap:8px;}
        .hbtn{position:relative;width:38px;height:38px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text);font-size:16px;cursor:pointer;transition:all 0.2s;text-decoration:none;}
        .hbtn:active{background:var(--accent);color:#fff;}

        /* STORIES */
        .stories-wrap{background:var(--surface);border-radius:18px;border:1px solid var(--border);margin:10px 10px 0;padding:12px 0 12px 12px;display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;box-shadow:var(--card-shadow);}
        .stories-wrap::-webkit-scrollbar{display:none;}
        .story-item{flex-shrink:0;width:100px;height:160px;border-radius:18px;overflow:hidden;position:relative;cursor:pointer;border:3px solid var(--accent);background:var(--surface3);}
        .story-item .story-bg{position:absolute;inset:0;background-size:cover;background-position:center;width:100%;height:100%;}
        .story-item .story-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.15) 0%,transparent 40%,rgba(0,0,0,0.55) 75%);}
        .story-item .story-user-badge{position:absolute;top:8px;left:8px;width:32px;height:32px;border-radius:50%;overflow:hidden;border:2px solid var(--accent);background:var(--surface3);}
        .story-item .story-user-badge img{width:100%;height:100%;object-fit:cover;}
        .story-item .story-name{position:absolute;bottom:8px;left:6px;right:6px;font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.8);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .story-add-box{flex-shrink:0;width:100px;height:160px;border-radius:18px;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;cursor:pointer;background:var(--surface);}
        .story-add-circle{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;}
        .story-add-box span{font-size:11px;font-weight:700;color:var(--text-muted);}

        /* COMPOSE */
        .compose-box{background:var(--surface);margin:10px 10px 0;padding:14px 16px;border-radius:18px;border:1px solid var(--border);box-shadow:var(--card-shadow);}
        .compose-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
        .compose-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);flex-shrink:0;}
        .compose-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:22px;padding:10px 16px;color:var(--text-muted);font-size:15px;font-family:inherit;cursor:pointer;user-select:none;}
        .compose-actions{display:flex;border-top:1px solid var(--border);padding-top:12px;gap:4px;}
        .compose-action{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 4px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;color:var(--text-muted);transition:background 0.15s;}
        .compose-action:active{background:var(--surface2);}
        .compose-action .ic-photo{color:#43e97b;}
        .compose-action .ic-video{color:var(--accent2);}

        /* FEED */
        .feed{display:flex;flex-direction:column;gap:10px;padding:10px 10px 0;}

        /* POST CARD */
        .post-card{background:var(--surface);border-radius:18px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--card-shadow);}
        .post-header{display:flex;align-items:center;gap:10px;padding:12px 14px 8px;}
        .post-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);flex-shrink:0;}
        .post-meta{flex:1;}
        .post-author{font-size:15px;font-weight:700;}
        .post-time{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px;margin-top:2px;}
        .post-time i{font-size:10px;}
        .post-menu{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:18px;cursor:pointer;transition:background 0.2s;}
        .post-menu:active{background:var(--surface2);}
        .post-mood{padding:0 14px 8px;font-size:13px;color:var(--text-muted);font-weight:600;}
        .post-content{padding:0 14px 10px;font-size:16px;line-height:1.55;color:var(--text);}
        .post-content.big{font-size:22px;font-weight:700;}
        .post-img{width:100%;max-height:400px;object-fit:cover;display:block;cursor:pointer;}
        .post-video{width:100%;max-height:400px;object-fit:contain;background:#000;display:block;}
        .post-audio{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);margin:0 14px 10px;border-radius:14px;}
        .audio-icon{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0;}
        .audio-info{flex:1;font-size:13px;font-weight:600;color:var(--text-muted);}
        .post-encuesta{padding:10px 14px;}
        .encuesta-pregunta-txt{font-size:15px;font-weight:700;margin-bottom:10px;}
        .encuesta-opcion{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;font-size:14px;font-weight:600;position:relative;overflow:hidden;}
        .encuesta-bar{position:absolute;left:0;top:0;height:100%;background:rgba(108,99,255,0.1);border-radius:11px;transition:width 0.6s;}
        .post-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(108,99,255,0.1);border-radius:10px;padding:3px 10px;font-size:12px;font-weight:700;color:var(--accent);margin:0 14px 8px;}
        .post-stats{padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
        .likes-count{font-size:13px;color:var(--text-muted);display:flex;align-items:center;gap:5px;}
        .like-bubble{width:18px;height:18px;border-radius:50%;background:var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#fff;}
        .comments-count{font-size:13px;color:var(--text-muted);}
        .post-actions{display:flex;border-top:1px solid var(--border);}
        .action-btn{position:relative;overflow:visible;flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:10px 4px;cursor:pointer;font-size:14px;font-weight:700;color:var(--text-muted);transition:background 0.15s;}
        .action-btn:active{background:var(--surface2);}
        .action-btn.liked{color:var(--accent);}
        .action-btn.liked i{color:var(--accent);}

        /* EMPTY / SKELETON */
        .empty-state{padding:48px 24px;text-align:center;color:var(--text-muted);}
        .empty-state i{font-size:48px;margin-bottom:16px;color:var(--border);}
        .empty-state h3{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px;}
        .empty-state p{font-size:14px;line-height:1.6;}
        .skeleton{background:var(--surface);border-radius:18px;border:1px solid var(--border);padding:14px;box-shadow:var(--card-shadow);}
        .sk-row{display:flex;gap:10px;margin-bottom:12px;}
        .sk-circle{width:44px;height:44px;border-radius:50%;background:var(--surface3);flex-shrink:0;animation:shimmer 1.4s infinite;}
        .sk-lines{flex:1;display:flex;flex-direction:column;gap:8px;justify-content:center;}
        .sk-line{height:10px;border-radius:6px;background:var(--surface3);animation:shimmer 1.4s infinite;}
        .sk-line.w70{width:70%;}
        .sk-line.w40{width:40%;}
        .sk-img{height:200px;border-radius:8px;background:var(--surface3);animation:shimmer 1.4s infinite;margin-top:8px;}
        @keyframes shimmer{0%,100%{opacity:1}50%{opacity:0.5}}

        /* LIKE ANIM */
        @keyframes like-pop{0%{transform:scale(1)}30%{transform:scale(1.45)}60%{transform:scale(0.88)}100%{transform:scale(1)}}
        @keyframes like-burst{0%{transform:translate(-50%,-50%) scale(0);opacity:1}100%{transform:translate(-50%,-50%) scale(1.8);opacity:0}}
        @keyframes like-particle{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
        .like-anim{animation:like-pop 0.4s cubic-bezier(0.36,0.07,0.19,0.97) both;}
        .like-ring{position:absolute;width:48px;height:48px;border-radius:50%;border:3px solid var(--accent);pointer-events:none;animation:like-burst 0.45s ease-out forwards;}
        .like-dot{position:absolute;width:7px;height:7px;border-radius:50%;background:var(--accent);pointer-events:none;animation:like-particle 0.5s ease-out forwards;}

        /* TOAST */
        .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a24;color:#fff;border-radius:30px;padding:12px 24px;font-size:14px;font-weight:700;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.3);opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

        /* NAV */
        .nav-float{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--header-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);padding:11px 30px;border-radius:44px;display:flex;gap:30px;box-shadow:0 8px 32px rgba(0,0,0,0.12);z-index:1000;}
        .tab{color:var(--text-muted);font-size:19px;cursor:pointer;padding:4px 2px;position:relative;transition:color 0.2s,transform 0.15s;text-decoration:none;display:flex;align-items:center;justify-content:center;}
        .tab:active{transform:scale(0.88);}
        .tab.active{color:var(--accent);}
        .tab.active::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--accent);border-radius:50%;}

        /* STORY VIEWER */
        .story-viewer{display:none;position:fixed;inset:0;z-index:9999;background:#000;}
        .story-viewer.open{display:block;}
        .story-viewer #sv-img,.story-viewer #sv-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
        .story-viewer-header{position:absolute;top:0;left:0;right:0;z-index:2;padding:52px 14px 20px;background:linear-gradient(to bottom,rgba(0,0,0,0.55) 0%,transparent 100%);}
        .sv-bars{display:flex;gap:4px;margin-bottom:12px;}
        .sv-progress{flex:1;height:3px;background:rgba(255,255,255,0.35);border-radius:2px;overflow:hidden;}
        .sv-fill{height:100%;background:#fff;width:0%;animation:story-prog 5s linear forwards;}
        @keyframes story-prog{from{width:0}to{width:100%}}
        .sv-user-row{display:flex;align-items:center;gap:10px;}
        .sv-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid #fff;flex-shrink:0;}
        .sv-user-info{flex:1;}
        .sv-name{color:#fff;font-size:14px;font-weight:700;}
        .sv-time{color:rgba(255,255,255,0.75);font-size:12px;}
        .sv-close{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;}
        .sv-bottom-fade{position:absolute;bottom:0;left:0;right:0;z-index:2;height:120px;background:linear-gradient(to top,rgba(0,0,0,0.4) 0%,transparent 100%);pointer-events:none;}

        /* SHEETS */
        .sheet-overlay{position:fixed;inset:0;z-index:9990;background:rgba(0,0,0,0.45);display:flex;flex-direction:column;justify-content:flex-end;animation:fadeIn 0.2s ease;}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .sheet{background:var(--surface);border-radius:24px 24px 0 0;max-height:85vh;display:flex;flex-direction:column;animation:slideUp 0.3s cubic-bezier(0.32,0.72,0,1);}
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 0;flex-shrink:0;}
        .sheet-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
        .sheet-title{font-size:16px;font-weight:800;color:var(--text);}
        .sheet-close{width:30px;height:30px;border-radius:50%;background:var(--surface2);border:none;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-muted);cursor:pointer;}
        .cs-list{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:14px;scrollbar-width:none;}
        .cs-list::-webkit-scrollbar{display:none;}
        .cs-comment{display:flex;gap:10px;align-items:flex-start;}
        .cs-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);flex-shrink:0;}
        .cs-bubble{flex:1;background:var(--surface2);border-radius:14px;padding:9px 13px;}
        .cs-author{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;}
        .cs-text{font-size:14px;color:var(--text);line-height:1.4;}
        .cs-time{font-size:11px;color:var(--text-muted);margin-top:4px;}
        .cs-empty{text-align:center;color:var(--text-muted);font-size:14px;padding:24px 0;}
        .cs-input-row{display:flex;align-items:center;gap:10px;padding:12px 16px 16px;border-top:1px solid var(--border);flex-shrink:0;}
        .cs-input-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--accent);}
        .cs-input{flex:1;min-width:0;background:var(--surface2);border:1.5px solid var(--border);border-radius:22px;padding:10px 16px;font-size:15px;color:var(--text);font-family:inherit;outline:none;transition:border-color 0.2s;}
        .cs-input:focus{border-color:var(--accent);}
        .cs-input::placeholder{color:var(--text-muted);}
        .cs-send{width:38px;height:38px;min-width:38px;border-radius:50%;border:none;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;}
        .cs-send:active{transform:scale(0.9);}
        .search-header{padding:14px 16px 10px;flex-shrink:0;}
        .search-title{font-size:17px;font-weight:800;margin-bottom:12px;}
        .search-input-wrap{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1.5px solid var(--border);border-radius:16px;padding:10px 14px;transition:border-color 0.2s;}
        .search-input-wrap:focus-within{border-color:var(--accent);}
        .search-input-wrap i{color:var(--text-muted);font-size:15px;}
        #search-input{flex:1;background:none;border:none;outline:none;font-size:16px;color:var(--text);font-family:inherit;}
        #search-input::placeholder{color:var(--text-muted);}
        #search-clear{color:var(--text-muted);font-size:14px;cursor:pointer;display:none;padding:2px 4px;}
        #search-clear.show{display:block;}
        .search-results{flex:1;overflow-y:auto;padding:8px 0 24px;scrollbar-width:none;}
        .search-results::-webkit-scrollbar{display:none;}
        .search-state{text-align:center;padding:40px 24px;color:var(--text-muted);}
        .search-state i{font-size:40px;margin-bottom:12px;display:block;opacity:0.35;}
        .search-state p{font-size:14px;font-weight:600;}
        .search-user-item{display:flex;align-items:center;gap:12px;padding:12px 18px;cursor:pointer;transition:background 0.15s;}
        .search-user-item:active{background:var(--surface2);}
        .search-user-avatar{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);flex-shrink:0;}
        .search-user-info{flex:1;min-width:0;}
        .search-user-name{font-size:15px;font-weight:700;color:var(--text);}
        .search-user-username{font-size:13px;color:var(--text-muted);margin-top:2px;}
        .search-follow-btn{padding:7px 16px;border-radius:20px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;flex-shrink:0;transition:all 0.2s;}
        .search-follow-btn.siguiendo{background:var(--surface2);color:var(--text-muted);border:1.5px solid var(--border);}
        .search-divider{font-size:11px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;padding:12px 18px 6px;}
        .notif-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;scrollbar-width:none;}
        .notif-list::-webkit-scrollbar{display:none;}
        .notif-item{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;position:relative;}
        .notif-item:active{background:var(--surface2);}
        .notif-item.unread{background:rgba(108,99,255,0.06);}
        .notif-item.unread::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 3px 3px 0;background:var(--accent);}
        .notif-avatar-wrap{position:relative;flex-shrink:0;}
        .notif-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--border);}
        .notif-icon-badge{position:absolute;bottom:-2px;right:-2px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;border:2px solid var(--surface);}
        .notif-body{flex:1;min-width:0;}
        .notif-text{font-size:14px;line-height:1.4;color:var(--text);}
        .notif-text strong{font-weight:700;}
        .notif-time{font-size:12px;color:var(--text-muted);margin-top:3px;}
        .notif-thumb{width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0;}
        .notif-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex-shrink:0;}
        .notif-empty{text-align:center;padding:48px 24px;color:var(--text-muted);}
        .notif-empty i{font-size:44px;margin-bottom:14px;display:block;opacity:0.4;}
        .notif-empty p{font-size:15px;font-weight:600;}
        .notif-mark-all{font-size:13px;font-weight:700;color:var(--accent);cursor:pointer;}
        #notif-badge{position:absolute;top:4px;right:4px;min-width:16px;height:16px;border-radius:8px;background:#e74c3c;color:#fff;font-size:10px;font-weight:800;display:none;align-items:center;justify-content:center;padding:0 3px;border:2px solid var(--header-bg);}
        #notif-badge.show{display:flex;}
        .story-sheet-option{display:flex;align-items:center;gap:16px;padding:16px 24px;cursor:pointer;transition:background 0.15s;border-radius:14px;margin:0 8px;}
        .story-sheet-option:active{background:var(--surface2);}
        .story-sheet-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;flex-shrink:0;}
        .story-sheet-label{font-size:16px;font-weight:700;color:var(--text);}
        .story-sheet-desc{font-size:13px;color:var(--text-muted);margin-top:2px;}
        @media(min-width:600px){.feed,.compose-box,.stories-wrap,.header{max-width:600px;margin-left:auto;margin-right:auto;}}
    </style>
</head>
<body>
<script>
    (function(){var t=localStorage.getItem('snapbook-theme')||'light';document.documentElement.setAttribute('data-theme',t);})();

<script type="module">
// ════════════════════════════════════════════════════════
//  IMPORTS
// ════════════════════════════════════════════════════════
import { auth, db } from './firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { ref, onValue, get, set, remove, push, query, orderByChild }
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

// ════════════════════════════════════════════════════════
//  TURSO — carga dinámica con fallback
// ════════════════════════════════════════════════════════
let sincronizarUsuario, crearPost, obtenerFeedCompleto, tursoToggleLike, misLikes;
let agregarComentario, obtenerComentarios, eliminarComentario, eliminarPost;
let crearHistoria, obtenerHistorias, eliminarHistoriasExpiradas, tursoQuery;
let votarEnEncuesta, miVotoEncuesta, obtenerEncuestasPorPosts;
let tursoOK = false;

try {
    const m = await import('./db.js');
    sincronizarUsuario         = m.sincronizarUsuario;
    crearPost                  = m.crearPost;
    obtenerFeedCompleto        = m.obtenerFeedCompleto;
    tursoToggleLike            = m.toggleLike;
    misLikes                   = m.misLikes;
    agregarComentario          = m.agregarComentario;
    obtenerComentarios         = m.obtenerComentarios;
    eliminarComentario         = m.eliminarComentario;
    eliminarPost               = m.eliminarPost;
    crearHistoria              = m.crearHistoria;
    obtenerHistorias           = m.obtenerHistorias;
    eliminarHistoriasExpiradas = m.eliminarHistoriasExpiradas;
    tursoQuery                 = m.tursoQuery;
    votarEnEncuesta            = m.votarEnEncuesta;
    miVotoEncuesta             = m.miVotoEncuesta;
    obtenerEncuestasPorPosts   = m.obtenerEncuestasPorPosts;
    tursoOK = true;
    console.log('✅ Turso OK');
} catch(e) {
    console.warn('⚠️ db.js no disponible:', e.message);
}

// Cache de encuestas Turso para el feed
const tursoEncuestas = {};  // postId  → enc object
const tursoMisVotos  = {};  // encuestaId → opcionIdx

// ════════════════════════════════════════════════════════
//  SUPABASE / CLOUDINARY
// ════════════════════════════════════════════════════════
const supabase = createClient(
    'https://ihefracdvmyuqgzzqjpf.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloZWZyYWNkdm15dXFnenpxanBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MjIyNTAsImV4cCI6MjA5MTA5ODI1MH0.iVczrV0sCrYoUE-kGuvtRiguCiQI13m_wLYZn1kS5C8'
);

async function supabaseUpload(file, carpeta, onProg) {
    const ext  = file.name.split('.').pop();
    const path = `${carpeta}/${Date.now()}.${ext}`;
    if (onProg) onProg(30);
    const { data, error } = await supabase.storage.from('Avatares').upload(path, file, { upsert: true });
    if (error) throw new Error('Supabase: ' + error.message);
    if (onProg) onProg(100);
    const { data: u } = supabase.storage.from('Avatares').getPublicUrl(data.path);
    return u.publicUrl;
}

async function cloudinaryUpload(file, onProg) {
    const fd = new FormData();
    fd.append('file', file); fd.append('upload_preset', 'snapbook');
    return new Promise((res, rej) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://api.cloudinary.com/v1_1/defhc9kz6/video/upload');
        if (onProg) xhr.upload.onprogress = e => { if (e.lengthComputable) onProg(Math.round(e.loaded/e.total*100)); };
        xhr.onload  = () => xhr.status === 200 ? res(JSON.parse(xhr.responseText).secure_url) : rej(new Error('Cloudinary error'));
        xhr.onerror = () => rej(new Error('Error de red'));
        xhr.send(fd);
    });
}

// ════════════════════════════════════════════════════════
//  ESTADO GLOBAL
// ════════════════════════════════════════════════════════
let currentUser  = null;
let followingSet = new Set();

// ── Feed state ───────────────────────────────────────────
// renderedIds es la ÚNICA fuente de verdad para deduplicación.
// Si un ID está aquí → nunca se vuelve a insertar en el DOM.
const renderedIds = new Set();
let fbUnsubscribe = null;   // unsubscribe del listener Firebase
let feedLoading   = false;
let feedDone      = false;
let feedCursor    = Date.now();

// ════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════
function timeAgo(ts) {
    const d = Math.floor((Date.now() - Number(ts)) / 1000);
    if (d < 60)    return 'Hace un momento';
    if (d < 3600)  return `Hace ${Math.floor(d/60)} min`;
    if (d < 86400) return `Hace ${Math.floor(d/3600)} h`;
    return new Date(Number(ts)).toLocaleDateString('es-MX', { day:'numeric', month:'short' });
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

function removeSkeleton() {
    document.getElementById('sk1')?.remove();
    document.getElementById('sk2')?.remove();
}

function formatDur(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

// ════════════════════════════════════════════════════════
//  buildPost — normaliza campos de Firebase y Turso
// ════════════════════════════════════════════════════════
function buildPost(id, p) {
    const autor    = p.autor     || p.nombre    || 'Usuario';
    const avatar   = p.avatar                   || 'default-avatar.png';
    const contenido= p.contenido || p.texto      || '';
    const imgUrl   = p.imagenPost|| p.imagen_url || '';
    const videoUrl = p.videoUrl  || p.video_url  || '';
    const audioUrl = p.audioUrl  || p.audio_url  || '';
    const ts       = Number(p.timestamp || 0);
    const isAnon   = p.esAnonimo || p.es_anonimo == 1;
    const isVoz    = p.esVoz     || !!audioUrl;

    const authorDisplay = isAnon ? '🎭 Anónimo' : autor;
    const avatarSrc     = isAnon ? 'default-avatar.png' : avatar;

    let mediaHTML = '';
    if (imgUrl)        mediaHTML = `<img class="post-img" src="${imgUrl}" loading="lazy" onclick="openImgFull('${imgUrl}')">`;
    else if (videoUrl) mediaHTML = `<video class="post-video" src="${videoUrl}" controls playsinline></video>`;

    let extraHTML = '';
    if (p.humor) extraHTML += `<div class="post-mood"><i class="fa-solid fa-face-smile"></i> Se siente: ${p.humor}</div>`;
    if (p.esMomento && p.tipoMomento) extraHTML += `<div class="post-tag"><i class="fa-solid fa-sun"></i> ${p.tipoMomento}</div>`;
    if (isVoz && audioUrl) {
        const dur = p.duracionAudio ? formatDur(p.duracionAudio) : '–';
        extraHTML += `<div class="post-audio"><div class="audio-icon"><i class="fa-solid fa-microphone"></i></div><div class="audio-info">Nota de voz · ${dur}<br><audio controls src="${audioUrl}" style="width:100%;margin-top:6px;"></audio></div></div>`;
    }
    if (p.esEncuesta && p.pregunta) {
        const totalV = (p.opciones||[]).reduce((a,o)=>a+(o.votos?Object.keys(o.votos).length:0),0);
        const optsH  = (p.opciones||[]).map((o,i)=>{
            const v = o.votos ? Object.keys(o.votos).length : 0;
            const pct = totalV > 0 ? Math.round(v/totalV*100) : 0;
            return `<div class="encuesta-opcion" onclick="votarEncuesta('${id}',${i})"><div class="encuesta-bar" style="width:${pct}%"></div><span style="position:relative">${o.texto}</span><span style="margin-left:auto;font-size:12px;color:var(--text-muted);position:relative">${pct}%</span></div>`;
        }).join('');
        extraHTML += `<div class="post-encuesta"><div class="encuesta-pregunta-txt">${p.pregunta}</div>${optsH}<div style="font-size:12px;color:var(--text-muted);margin-top:4px;">${totalV} voto${totalV!==1?'s':''}</div></div>`;
    }

    const big  = contenido.length < 100 && !imgUrl && !videoUrl ? ' big' : '';
    const card = document.createElement('div');
    card.className  = 'post-card';
    card.dataset.id = id;
    card.innerHTML  = `
        <div class="post-header">
            <img class="post-avatar" src="${avatarSrc}" onerror="this.src='default-avatar.png'" onclick="location.href='Profile.html?uid=${p.uid}'">
            <div class="post-meta">
                <div class="post-author">${authorDisplay}</div>
                <div class="post-time">${timeAgo(ts)} <i class="fa-solid fa-earth-americas"></i></div>
            </div>
            <div class="post-menu" onclick="postMenu('${id}','${p.uid}')"><i class="fa-solid fa-ellipsis"></i></div>
        </div>
        ${(contenido && !p.esEncuesta) ? `<div class="post-content${big}">${contenido}</div>` : ''}
        ${extraHTML}${mediaHTML}
        <div class="post-stats">
            <div class="likes-count" id="likes-count-${id}"></div>
            <div class="comments-count" id="comments-count-${id}" onclick="openCommentSheet('${id}')" style="cursor:pointer;">Ver comentarios</div>
        </div>
        <div class="post-actions">
            <div class="action-btn" id="like-btn-${id}" onclick="toggleLike('${id}')">
                <i class="fa-regular fa-thumbs-up"></i> Me gusta
            </div>
            <div class="action-btn" onclick="openCommentSheet('${id}')">
                <i class="fa-regular fa-comment"></i> Comentar
            </div>
            <div class="action-btn" onclick="sharePost('${id}')">
                <i class="fa-solid fa-share"></i> Compartir
            </div>
        </div>`;
    return card;
}

function applyLikeState(id, liked) {
    const btn  = document.getElementById(`like-btn-${id}`);
    const icon = btn?.querySelector('i');
    if (!btn) return;
    btn.classList.toggle('liked', liked);
    if (icon) icon.className = `fa-${liked?'solid':'regular'} fa-thumbs-up`;
}

// ════════════════════════════════════════════════════════
//  FEED — arquitectura limpia
//
//  REGLA: renderedIds es la única fuente de verdad.
//  Un post se inserta en el DOM UNA SOLA VEZ, sin importar
//  de qué fuente venga. Firebase y Turso comparten el mismo Set.
// ════════════════════════════════════════════════════════
async function initFeed() {
    if (feedLoading) return;
    feedLoading = true;
    const feed  = document.getElementById('feed');

    // Cancelar listener anterior y limpiar estado
    if (fbUnsubscribe) { fbUnsubscribe(); fbUnsubscribe = null; }
    renderedIds.clear();
    feedDone   = false;
    feedCursor = Date.now();
    feed.querySelectorAll('.post-card, .empty-state').forEach(el => el.remove());

    // Obtener lista de seguidos
    const sigSnap = await get(ref(db, `siguiendo/${currentUser.uid}`));
    followingSet  = new Set(sigSnap.exists() ? Object.keys(sigSnap.val()) : []);
    followingSet.add(currentUser.uid);

    // ── FUENTE A: Turso (paginado) ──────────────────────
    // Carga los posts históricos primero. Firebase se registra DESPUÉS
    // para evitar la condición de carrera que causaba duplicados.
    if (tursoOK) {
        try {
            const uids = Array.from(followingSet);
            const { posts, encuestas, misVotos } = await obtenerFeedCompleto(uids, 20, feedCursor, currentUser.uid);
            if (posts.length < 20) feedDone = true;
            if (posts.length > 0)  feedCursor = Number(posts[posts.length-1].timestamp);

            // Cachea encuestas y votos para votarEncuesta()
            Object.assign(tursoEncuestas, encuestas);
            Object.assign(tursoMisVotos, misVotos);

            const likedSet = await misLikes(currentUser.uid, posts.map(p => p.id));

            posts.forEach(p => {
                if (renderedIds.has(p.id)) return;  // nunca duplicar
                renderedIds.add(p.id);

                // Inyecta datos de encuesta Turso en el objeto del post
                if (encuestas[p.id]) {
                    const enc = encuestas[p.id];
                    p.esEncuesta = true;
                    p.pregunta   = enc.pregunta;
                    p.opciones   = enc.opciones.map((texto, i) => ({
                        texto,
                        votos: buildFakeVotosObj(enc.votosPorOpcion?.[i] || 0)
                    }));
                    p._encId  = enc.id;
                    p._miVoto = misVotos[enc.id] ?? null;
                }
                // Normaliza post de voz
                if (p.es_voz == 1 || p.es_voz === true) {
                    p.esVoz        = true;
                    p.duracionAudio = Number(p.duracion_audio || 0);
                }

                const card = buildPost(p.id, p);
                const lc   = Number(p.total_likes || 0);
                card.querySelector(`#likes-count-${p.id}`).innerHTML =
                    lc > 0 ? `<div class="like-bubble">👍</div> <span>${lc} Me gusta</span>` : '';
                const cc = Number(p.total_comentarios || 0);
                card.querySelector(`#comments-count-${p.id}`).textContent =
                    cc > 0 ? `${cc} comentario${cc!==1?'s':''}` : 'Ver comentarios';
                feed.appendChild(card);
                if (likedSet.has(p.id)) applyLikeState(p.id, true);
            });
        } catch(err) {
            console.warn('Turso feed error:', err);
        }
    }

    // Helper: convierte conteo numérico a objeto fake de votos
    function buildFakeVotosObj(count) {
        const obj = {};
        for (let i = 0; i < count; i++) obj['v'+i] = true;
        return obj;
    }

    // ── FUENTE B: Firebase realtime ─────────────────────
    // Se registra DESPUÉS de que Turso termine. Así renderedIds ya tiene
    // todos los IDs de Turso y Firebase nunca puede duplicarlos.
    // Solo inserta posts que NO están en renderedIds (posts nuevos en tiempo real).
    const postsRef = query(ref(db, 'publicaciones'), orderByChild('timestamp'));
    fbUnsubscribe  = onValue(postsRef, snap => {
        const all = [];
        snap.forEach(c => all.push({ id: c.key, ...c.val() }));

        all
            .filter(p => p.esAnonimo || p.uid === currentUser.uid || followingSet.has(p.uid))
            .sort((a, b) => Number(b.timestamp) - Number(a.timestamp))
            .forEach(p => {
                if (renderedIds.has(p.id)) return;  // ya renderizado por Turso o Firebase → ignorar
                renderedIds.add(p.id);

                const card      = buildPost(p.id, p);
                const likeCount = p.likes ? Object.keys(p.likes).length : 0;
                card.querySelector(`#likes-count-${p.id}`).innerHTML =
                    likeCount > 0 ? `<div class="like-bubble">👍</div> <span>${likeCount} Me gusta</span>` : '';
                if (p.likes?.[currentUser.uid]) {
                    const btn  = card.querySelector(`#like-btn-${p.id}`);
                    const icon = btn?.querySelector('i');
                    if (btn)  btn.classList.add('liked');
                    if (icon) icon.className = 'fa-solid fa-thumbs-up';
                }

                // Posts nuevos van arriba, históricos abajo
                const first = feed.querySelector('.post-card');
                if (first) feed.insertBefore(card, first);
                else        feed.appendChild(card);

                watchCommentCount(p.id);
            });

        removeSkeleton();

        if (renderedIds.size === 0 && !feed.querySelector('.empty-state')) {
            const em = document.createElement('div');
            em.className = 'empty-state';
            em.innerHTML = `<i class="fa-solid fa-users"></i><h3>Sigue a alguien para ver posts</h3><p>Sus publicaciones aparecerán aquí.</p>`;
            feed.appendChild(em);
        } else if (renderedIds.size > 0) {
            feed.querySelector('.empty-state')?.remove();
        }
    });

    removeSkeleton();
    feedLoading = false;
    if (tursoOK) setupInfiniteScroll();
}

// Infinite scroll — solo carga más desde Turso
async function loadMore() {
    if (feedLoading || feedDone || !tursoOK) return;
    feedLoading = true;
    try {
        const uids = Array.from(followingSet);
        const { posts, encuestas, misVotos } = await obtenerFeedCompleto(uids, 20, feedCursor, currentUser.uid);
        if (posts.length < 20) feedDone = true;
        if (posts.length > 0)  feedCursor = Number(posts[posts.length-1].timestamp);

        Object.assign(tursoEncuestas, encuestas);
        Object.assign(tursoMisVotos, misVotos);

        const likedSet = await misLikes(currentUser.uid, posts.map(p => p.id));
        const feed     = document.getElementById('feed');

        posts.forEach(p => {
            if (renderedIds.has(p.id)) return;
            renderedIds.add(p.id);

            if (encuestas[p.id]) {
                const enc = encuestas[p.id];
                p.esEncuesta = true;
                p.pregunta   = enc.pregunta;
                p.opciones   = enc.opciones.map((texto, i) => ({
                    texto, votos: buildFakeVotosObj(enc.votosPorOpcion?.[i] || 0)
                }));
                p._encId  = enc.id;
                p._miVoto = misVotos[enc.id] ?? null;
            }
            if (p.es_voz == 1 || p.es_voz === true) {
                p.esVoz = true;
                p.duracionAudio = Number(p.duracion_audio || 0);
            }

            const card = buildPost(p.id, p);
            const lc   = Number(p.total_likes || 0);
            card.querySelector(`#likes-count-${p.id}`).innerHTML =
                lc > 0 ? `<div class="like-bubble">👍</div> <span>${lc} Me gusta</span>` : '';
            const cc = Number(p.total_comentarios || 0);
            card.querySelector(`#comments-count-${p.id}`).textContent =
                cc > 0 ? `${cc} comentario${cc!==1?'s':''}` : 'Ver comentarios';
            feed.appendChild(card);
            if (likedSet.has(p.id)) applyLikeState(p.id, true);
        });
    } catch(err) { console.warn('loadMore error:', err); }
    feedLoading = false;
}

function setupInfiniteScroll() {
    window.addEventListener('scroll', () => {
        if (feedDone || feedLoading) return;
        if (window.scrollY + window.innerHeight >= document.body.scrollHeight - 300) loadMore();
    }, { passive: true });
}

// ════════════════════════════════════════════════════════
//  COMMENT COUNT
// ════════════════════════════════════════════════════════
async function watchCommentCount(postId) {
    const el = document.getElementById(`comments-count-${postId}`);
    if (!el) return;
    try {
        const res = await tursoQuery('SELECT COUNT(*) as n FROM comentarios WHERE post_id = ?', [postId]);
        const n   = Number(res[0]?.n || 0);
        el.textContent = n > 0 ? `${n} comentario${n!==1?'s':''}` : 'Ver comentarios';
    } catch {
        onValue(ref(db, `comentarios/${postId}`), snap => {
            const n = snap.exists() ? Object.keys(snap.val()).length : 0;
            el.textContent = n > 0 ? `${n} comentario${n!==1?'s':''}` : 'Ver comentarios';
        });
    }
}

// ════════════════════════════════════════════════════════
//  LIKE

window.toggleLike = async function(id) {
    if (!currentUser) return;
    const btn    = document.getElementById(`like-btn-${id}`);
    const iconEl = btn?.querySelector('i');
    if (!btn) return;

    const wasLiked = btn.classList.contains('liked');
    const nowLiked = !wasLiked;
    applyLikeState(id, nowLiked); // optimistic UI

    try {
        await tursoToggleLike(id, currentUser.uid);

        if (nowLiked) {
            iconEl?.classList.add('like-anim');
            iconEl?.addEventListener('animationend', () => iconEl.classList.remove('like-anim'), { once: true });
            const ring = document.createElement('div');
            ring.className = 'like-ring'; ring.style.cssText = 'left:50%;top:50%;';
            btn.appendChild(ring); ring.addEventListener('animationend', () => ring.remove());
            const colors = ['#1877f2','#ff6584','#ffcc00','#43e97b','#f093fb'];
            for (let k = 0; k < 6; k++) {
                const dot   = document.createElement('div');
                dot.className = 'like-dot';
                const angle = (k/6)*Math.PI*2, dist = 28 + Math.random()*14;
                dot.style.cssText = `left:50%;top:50%;background:${colors[k%5]};--tx:${Math.round(Math.cos(angle)*dist)}px;--ty:${Math.round(Math.sin(angle)*dist)}px;animation-delay:${k*0.03}s;`;
                btn.appendChild(dot); dot.addEventListener('animationend', () => dot.remove());
            }
            const ps = await get(ref(db, `publicaciones/${id}`));
            if (ps.exists() && ps.val().uid) writeNotif(ps.val().uid, 'like', { postId: id, postImagen: ps.val().imagenPost||'' });
        }

        const res   = await tursoQuery('SELECT COUNT(*) as total FROM likes WHERE post_id = ?', [id]);
        const count = Number(res[0]?.total || 0);
        const bar   = document.getElementById(`likes-count-${id}`);
        if (bar) bar.innerHTML = count > 0 ? `<div class="like-bubble">👍</div> <span>${count} Me gusta</span>` : '';

    } catch {
        // Firebase fallback
        applyLikeState(id, wasLiked);
        const likeRef = ref(db, `publicaciones/${id}/likes/${currentUser.uid}`);
        const snap    = await get(likeRef);
        if (snap.exists()) await remove(likeRef);
        else {
            await set(likeRef, true);
            const ps = await get(ref(db, `publicaciones/${id}`));
            if (ps.exists() && ps.val().uid) writeNotif(ps.val().uid, 'like', { postId: id, postImagen: ps.val().imagenPost||'' });
        }
        const allSnap = await get(ref(db, `publicaciones/${id}/likes`));
        const count   = allSnap.exists() ? Object.keys(allSnap.val()).length : 0;
        const bar     = document.getElementById(`likes-count-${id}`);
        if (bar) bar.innerHTML = count > 0 ? `<div class="like-bubble">👍</div> <span>${count} Me gusta</span>` : '';
        applyLikeState(id, !wasLiked);
    }
};

window.votarEncuesta = async function(postId, idx) {
    if (!currentUser) return;

    // ── Turso primero si hay encuesta en cache ────────────────────
    const enc = tursoEncuestas[postId];
    if (enc && tursoOK) {
        try {
            const res = await votarEnEncuesta(enc.id, currentUser.uid, idx);
            if (res.yaVoto) { showToast('Ya votaste en esta encuesta'); return; }
            tursoMisVotos[enc.id] = idx;
            // Actualiza UI: incrementa el conteo visual
            const card = document.querySelector(`.post-card[data-id="${postId}"]`);
            if (card) {
                const bars = card.querySelectorAll('.encuesta-bar');
                const pcts = card.querySelectorAll('.encuesta-opcion span:last-child');
                // Recalcular con data actualizada
                if (enc.votosPorOpcion) {
                    enc.votosPorOpcion[idx] = (enc.votosPorOpcion[idx] || 0) + 1;
                    enc.totalVotos = (enc.totalVotos || 0) + 1;
                    bars.forEach((bar, i) => {
                        const v   = enc.votosPorOpcion[i] || 0;
                        const pct = enc.totalVotos > 0 ? Math.round(v / enc.totalVotos * 100) : 0;
                        bar.style.width = pct + '%';
                        if (pcts[i]) pcts[i].textContent = pct + '%';
                    });
                }
            }
            showToast('✅ Voto registrado');
        } catch(e) {
            console.warn('votarEncuesta Turso:', e);
            showToast('❌ Error al votar');
        }
        return;
    }

    // ── Fallback Firebase ─────────────────────────────────────────
    const vRef = ref(db, `publicaciones/${postId}/opciones/${idx}/votos/${currentUser.uid}`);
    const snap = await get(vRef);
    if (!snap.exists()) { await set(vRef, true); showToast('✅ Voto registrado'); }
    else showToast('Ya votaste en esta encuesta');
};

    overlay.innerHTML = `
        <div class="sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <span class="sheet-title">Comentarios</span>

            </div>

                <div class="cs-empty"><i class="fa-solid fa-circle-notch fa-spin" style="font-size:20px;margin-bottom:8px;display:block;"></i>Cargando...</div>
            </div>

    inp?.addEventListener('keydown', e => { if (e.key === 'Enter') sendComment(postId); });

    async function render() {
        const el = document.getElementById(`cs-list-${postId}`);
        if (!el) return;
        try {
            const arr = await obtenerComentarios(postId, 100);
            if (!arr.length) { el.innerHTML = `<div class="cs-empty"><i class="fa-regular fa-comment" style="font-size:28px;margin-bottom:8px;display:block;"></i>Sé el primero en comentar</div>`; return; }
            el.innerHTML = arr.map(c=>`
                <div class="cs-comment" data-cid="${c.id}">
                    <img class="cs-avatar" src="${c.avatar||'default-avatar.png'}" onerror="this.src='default-avatar.png'">
                    <div class="cs-bubble">
                        <div class="cs-author">${c.nombre||'Usuario'}</div>
                        <div class="cs-text">${c.texto}</div>
                        <div class="cs-time">${timeAgo(Number(c.timestamp))}</div>
                        ${c.uid===currentUser.uid?`<div style="font-size:12px;color:#e74c3c;cursor:pointer;margin-top:4px;" onclick="deleteComment('${postId}','${c.id}')"><i class="fa-solid fa-trash"></i> Eliminar</div>`:''}
                    </div>
                </div>`).join('');
            el.scrollTop = el.scrollHeight;
        } catch {
            onValue(ref(db,`comentarios/${postId}`), snap => {
                if (!snap.exists()) { el.innerHTML=`<div class="cs-empty"><i class="fa-regular fa-comment" style="font-size:28px;margin-bottom:8px;display:block;"></i>Sé el primero en comentar</div>`; return; }
                const arr=[];snap.forEach(c=>arr.push(c.val()));arr.sort((a,b)=>a.timestamp-b.timestamp);
                el.innerHTML=arr.map(c=>`<div class="cs-comment"><img class="cs-avatar" src="${c.avatar||'default-avatar.png'}" onerror="this.src='default-avatar.png'"><div class="cs-bubble"><div class="cs-author">${c.autor||'Usuario'}</div><div class="cs-text">${c.texto}</div><div class="cs-time">${timeAgo(c.timestamp)}</div></div></div>`).join('');
                el.scrollTop=el.scrollHeight;
            });
        }

    render();

};

window.deleteComment = async function(postId, commentId) {
    if (!confirm('¿Eliminar comentario?')) return;
    try {
        await eliminarComentario(commentId, currentUser.uid);
        document.querySelector(`.cs-comment[data-cid="${commentId}"]`)?.remove();
        watchCommentCount(postId);
        showToast('Comentario eliminado');
    } catch { showToast('Error al eliminar'); }
};

window.sendComment = async function(postId) {
    const inp = document.getElementById(`cs-input-${postId}`);
    const txt = inp?.value.trim();
    if (!txt || !currentUser) return;
    inp.value = '';
    try {
        await agregarComentario(postId, currentUser, txt);
        const ov = document.querySelector('.sheet-overlay');
        if (ov?._refresh) await ov._refresh();
        watchCommentCount(postId);
    } catch {
        await push(ref(db, `comentarios/${postId}`), {
            autor: currentUser.displayName||'Usuario', avatar: currentUser.photoURL||'',
            uid: currentUser.uid, texto: txt, timestamp: Date.now()
        });
    }
    const ps = await get(ref(db, `publicaciones/${postId}`));
    if (ps.exists() && ps.val().uid) writeNotif(ps.val().uid, 'comment', { postId, comentario: txt, postImagen: ps.val().imagenPost||'' });
};

async function loadStories() {
    const seen = new Set();
    const obj  = {};

    try {
        const snap = await get(ref(db, 'historias'));
        if (snap.exists()) {
            const now = Date.now();
            snap.forEach(c => {
                const s = c.val();
                if (!s.uid || (s.expira && s.expira <= now)) return;
                const key = `${s.uid}_${Math.floor(Number(s.timestamp)/1000)}`;
                if (seen.has(key)) return;
                seen.add(key);
                obj[c.key] = s;
            });
        }
    } catch(e) { console.warn('Firebase historias:', e); }

    if (tursoOK) {
        try {
            await eliminarHistoriasExpiradas();
            const rows = await obtenerHistorias();
            rows.forEach(r => {
                const key = `${r.uid}_${Math.floor(Number(r.timestamp)/1000)}`;
                if (seen.has(key)) return;
                seen.add(key);
                obj[r.id] = { uid:r.uid, autor:r.autor, avatar:r.avatar, imagenUrl:r.imagen_url, videoUrl:r.video_url, textoHistoria:r.texto_historia, bgGradient:r.bg_gradient, timestamp:Number(r.timestamp), expira:Number(r.expira) };
            });
        } catch(e) { console.warn('Turso historias:', e); }
    }

    if (Object.keys(obj).length > 0) buildStories(obj);
}

function buildStories(data) {
    const list = document.getElementById('stories-list');
    list.innerHTML = '';
    const byUser = {};
    Object.entries(data).forEach(([id, s]) => {
        if (!s.uid) return;
        if (!followingSet.has(s.uid) && s.uid !== currentUser.uid) return;
        if (s.expira && Date.now() > s.expira) return;
        if (!byUser[s.uid]) byUser[s.uid] = [];
        byUser[s.uid].push({ ...s, id });
    });
    Object.values(byUser).forEach(stories => {
        stories.sort((a,b) => a.timestamp - b.timestamp);
        const latest  = stories[stories.length-1];
        const isMe    = latest.uid === currentUser.uid;
        const mUrl    = latest.imagenUrl || latest.videoUrl || '';
        const bgStyle = latest.textoHistoria
            ? `background:${latest.bgGradient||'linear-gradient(135deg,var(--accent),var(--accent2))'}`
            : (mUrl ? `background-image:url('${mUrl}')` : `background:var(--surface3)`);
        const div = document.createElement('div');
        div.className = 'story-item';
        div.innerHTML = `
            <div class="story-bg" style="${bgStyle};background-size:cover;background-position:center;"></div>
            <div class="story-overlay"></div>
            ${latest.textoHistoria?`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:10px;font-size:12px;font-weight:700;color:#fff;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,0.5);">${latest.textoHistoria}</div>`:''}
            <div class="story-user-badge"><img src="${latest.avatar||'default-avatar.png'}" onerror="this.src='default-avatar.png'"></div>
            ${stories.length>1?`<div style="position:absolute;top:6px;right:6px;background:var(--accent);color:#fff;font-size:9px;font-weight:800;border-radius:8px;padding:2px 5px;">${stories.length}</div>`:''}
            <span class="story-name">${isMe?'Tu historia':(latest.autor||'Usuario')}</span>`;
        div.onclick = () => openStoryGroup(stories, 0);
        list.appendChild(div);
    });
}

let _svStories=[], _svIndex=0, _svTimer=null;
window.openStoryGroup = function(stories, start) { _svStories=stories; _svIndex=start; _svRender(); document.getElementById('story-viewer').classList.add('open'); };
function _svRender() {
    clearTimeout(_svTimer);
    const s=_svStories[_svIndex], sv=document.getElementById('story-viewer');
    const img=document.getElementById('sv-img'), vid=document.getElementById('sv-video');
    document.getElementById('sv-name').textContent=s.autor||'Usuario';
    document.getElementById('sv-avatar').src=s.avatar||'default-avatar.png';
    document.getElementById('sv-time').textContent=timeAgo(s.timestamp);
    document.getElementById('sv-bars').innerHTML=_svStories.map((_,i)=>`<div class="sv-progress"><div class="sv-fill" id="sv-bar-${i}" style="width:${i<_svIndex?'100%':'0%'};animation:none;"></div></div>`).join('');
    requestAnimationFrame(()=>{const bar=document.getElementById(`sv-bar-${_svIndex}`);if(bar){bar.style.animation='none';bar.offsetHeight;bar.style.animation='story-prog 5s linear forwards';}});
    img.style.display='none'; vid.style.display='none';
    const txtEl=document.getElementById('sv-texto'); if(txtEl) txtEl.style.display='none';
    if(s.textoHistoria){sv.style.background=s.bgGradient||'linear-gradient(135deg,#6c63ff,#f5576c)';let el=document.getElementById('sv-texto');if(!el){el=document.createElement('div');el.id='sv-texto';el.style.cssText='position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;padding:32px;font-size:26px;font-weight:800;color:#fff;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,0.4);line-height:1.3;pointer-events:none;';sv.appendChild(el);}el.textContent=s.textoHistoria;el.style.display='flex';}
    else{sv.style.background='#000';if(s.videoUrl){vid.src=s.videoUrl;vid.style.display='block';}else{img.src=s.imagenUrl||'';img.style.display='block';}}
    _svTimer=setTimeout(()=>_svNext(),5000);
}
window._svNext=function(){if(_svIndex<_svStories.length-1){_svIndex++;_svRender();}else closeStory();};
window._svPrev=function(){if(_svIndex>0){_svIndex--;_svRender();}};
window.closeStory=function(){clearTimeout(_svTimer);document.getElementById('story-viewer').classList.remove('open');document.getElementById('sv-video').src='';_svStories=[];_svIndex=0;};

};
window.storyShowTextEditor = function() { document.getElementById('story-type-picker').style.display='none'; document.getElementById('story-text-view').style.display='flex'; };
window.storyBackToPicker   = function() { _storyFile=null;_storyType=null; document.getElementById('story-preview-view').style.display='none'; document.getElementById('story-text-view').style.display='none'; document.getElementById('story-type-picker').style.display='flex'; const b=document.getElementById('story-upload-bar'); if(b) b.style.display='none'; };
window.storyPublish = async function() {
    if(!_storyFile||!currentUser) return;
    const btn=document.getElementById('story-publish-btn'); btn.disabled=true; btn.innerHTML="<i class='fa-solid fa-spinner fa-spin'></i> Subiendo...";
    document.getElementById('story-upload-bar').style.display='block';
    const onProg=pct=>{document.getElementById('story-upload-fill').style.width=pct+'%';document.getElementById('story-upload-pct').textContent=`Subiendo... ${pct}%`;};
    try {
        let url; if(_storyType==='video') url=await cloudinaryUpload(_storyFile,onProg); else url=await supabaseUpload(_storyFile,`stories/${currentUser.uid}`,onProg);
        const now=Date.now(), data={uid:currentUser.uid,autor:currentUser.displayName||'Usuario',avatar:currentUser.photoURL||'',timestamp:now,expira:now+86400000};
        if(_storyType==='imagen') data.imagenUrl=url; else data.videoUrl=url;
        await push(ref(db,'historias'),data);
        try{await crearHistoria(currentUser,{...data});}catch(e){console.warn(e);}
        showToast('✅ Historia publicada'); document.querySelector('.sheet-overlay')?.remove(); loadStories();
    } catch(err) { showToast('❌ Error: '+err.message); btn.disabled=false; btn.innerHTML="<i class='fa-solid fa-paper-plane'></i> Publicar historia"; }
};
window.storyPublishText = async function() {
    const texto=document.getElementById('story-text-input')?.value.trim();
    if(!texto||!currentUser){showToast('Escribe algo primero');return;}
    const now=Date.now(), data={uid:currentUser.uid,autor:currentUser.displayName||'Usuario',avatar:currentUser.photoURL||'',timestamp:now,expira:now+86400000,textoHistoria:texto,bgGradient:_storyBg};
    await push(ref(db,'historias'),data);
    try{await crearHistoria(currentUser,data);}catch(e){console.warn(e);}
    showToast('✅ Historia publicada'); document.querySelector('.sheet-overlay')?.remove(); loadStories();
};

// ════════════════════════════════════════════════════════
//  BÚSQUEDA
// ════════════════════════════════════════════════════════
window.openSearchSheet = function() {
    const overlay = document.createElement('div');
    overlay.className = 'sheet-overlay';
    overlay.innerHTML = `
        <div class="sheet" style="max-height:88vh;">
            <div class="sheet-handle"></div>
            <div class="search-header">
                <div class="search-title">🔍 Buscar personas</div>
                <div class="search-input-wrap"><i class="fa-solid fa-magnifying-glass"></i><input id="search-input" type="text" placeholder="Buscar por nombre..." autocomplete="off" autocorrect="off" spellcheck="false"><span id="search-clear" onclick="clearSearch()"><i class="fa-solid fa-xmark"></i></span></div>
            </div>
            <div class="search-results" id="search-results"><div class="search-state"><i class="fa-solid fa-users"></i><p>Escribe un nombre para buscar</p></div></div>
        </div>`;
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
    const inp = document.getElementById('search-input'); inp.focus();
    let timer;
    inp.addEventListener('input', () => {
        const q = inp.value.trim();
        document.getElementById('search-clear').classList.toggle('show', q.length > 0);
        clearTimeout(timer);
        if (!q) { document.getElementById('search-results').innerHTML=`<div class="search-state"><i class="fa-solid fa-users"></i><p>Escribe un nombre para buscar</p></div>`; return; }
        if (q.length < 2) return;
        timer = setTimeout(() => runSearch(q), 350);
    });
};

window.clearSearch = function() {
    const inp=document.getElementById('search-input'); if(inp){inp.value='';inp.focus();}
    document.getElementById('search-clear')?.classList.remove('show');
    document.getElementById('search-results').innerHTML=`<div class="search-state"><i class="fa-solid fa-users"></i><p>Escribe un nombre para buscar</p></div>`;
};

async function runSearch(q) {
    const res = document.getElementById('search-results'); if (!res) return;
    res.innerHTML=`<div class="search-state"><i class="fa-solid fa-circle-notch fa-spin" style="opacity:.5;"></i><p>Buscando...</p></div>`;
    try {
        const snap = await get(ref(db,'usuarios'));
        if (!snap.exists()) { res.innerHTML=`<div class="search-state"><i class="fa-solid fa-user-slash"></i><p>No se encontraron usuarios</p></div>`; return; }
        const qL = q.toLowerCase(), matches = [];
        snap.forEach(c => { const u=c.val(), n=(u.nombre||u.displayName||'').toLowerCase(), us=(u.username||u.nombre||'').toLowerCase(); if(n.includes(qL)||us.includes(qL)) matches.push({uid:c.key,...u}); });
        const sigSnap = await get(ref(db, `siguiendo/${currentUser.uid}`));
        const sigSet  = new Set(sigSnap.exists() ? Object.keys(sigSnap.val()) : []);
        if (!matches.length) { res.innerHTML=`<div class="search-state"><i class="fa-solid fa-user-slash"></i><p>Sin resultados para "<strong>${q}</strong>"</p></div>`; return; }
        res.innerHTML = `<div class="search-divider">${matches.length} resultado${matches.length!==1?'s':''}</div>` +
            matches.map(u => {
                const isMe=u.uid===currentUser.uid, fol=sigSet.has(u.uid);
                const av=u.photoURL||u.avatar||`https://ui-avatars.com/api/?name=${encodeURIComponent(u.nombre||'U')}&background=6c63ff&color=fff&size=96`;
                const btn=isMe?`<span style="font-size:12px;color:var(--text-muted);font-weight:700;">Tú</span>`:`<button class="search-follow-btn ${fol?'siguiendo':''}" onclick="event.stopPropagation();searchToggleFollow('${u.uid}',this,event)">${fol?'Siguiendo':'Seguir'}</button>`;
                return `<div class="search-user-item" onclick="goToProfile('${u.uid}')"><img class="search-user-avatar" src="${av}" onerror="this.src='default-avatar.png'"><div class="search-user-info"><div class="search-user-name">${u.nombre||u.displayName||'Usuario'}</div><div class="search-user-username">@${(u.username||u.nombre||'usuario').toLowerCase().replace(/\s+/g,'')}</div></div>${btn}</div>`;
            }).join('');
    } catch { res.innerHTML=`<div class="search-state"><i class="fa-solid fa-triangle-exclamation"></i><p>Error al buscar</p></div>`; }
}

window.goToProfile = function(uid) { document.querySelector('.sheet-overlay')?.remove(); location.href=`Profile.html?uid=${uid}`; };
window.searchToggleFollow = async function(uid, btn, event) {
    if (event) event.stopPropagation(); if (!currentUser) return; btn.disabled=true;
    const fRef=ref(db,`siguiendo/${currentUser.uid}/${uid}`), sRef=ref(db,`seguidores/${uid}/${currentUser.uid}`);
    const snap=await get(fRef);
    if (snap.exists()) { await remove(fRef); await remove(sRef); btn.textContent='Seguir'; btn.classList.remove('siguiendo'); }
    else { await set(fRef,true); await set(sRef,true); btn.textContent='Siguiendo'; btn.classList.add('siguiendo'); writeNotif(uid,'follow'); showToast('✅ Ahora lo sigues'); }
    btn.disabled=false;
};

// ════════════════════════════════════════════════════════
//  NOTIFICACIONES
// ════════════════════════════════════════════════════════
function listenNotifications(uid) {
    onValue(ref(db,`notificaciones/${uid}`), snap => {
        let unread=0; if(snap.exists()) snap.forEach(n=>{if(!n.val().leida) unread++;});
        const badge=document.getElementById('notif-badge');
        if(unread>0){badge.textContent=unread>9?'9+':unread;badge.classList.add('show');}else badge.classList.remove('show');
    });
}

window.openNotifSheet = function() {
    const overlay = document.createElement('div');
    overlay.className = 'sheet-overlay';
    overlay.innerHTML = `
        <div class="sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-header"><span class="sheet-title">🔔 Notificaciones</span><span class="notif-mark-all" onclick="markAllRead()">Marcar todo leído</span></div>
            <div class="notif-list" id="notif-list-content"><div class="notif-empty"><i class="fa-regular fa-bell"></i><p>Cargando...</p></div></div>
        </div>`;
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
    loadNotifList();
};

async function loadNotifList() {
    const el=document.getElementById('notif-list-content'); if(!el||!currentUser) return;
    const snap=await get(ref(db,`notificaciones/${currentUser.uid}`));
    if(!snap.exists()){el.innerHTML=`<div class="notif-empty"><i class="fa-regular fa-bell"></i><p>Sin notificaciones aún</p></div>`;return;}
    const items=[]; snap.forEach(c=>items.push({key:c.key,...c.val()})); items.sort((a,b)=>b.timestamp-a.timestamp);
    const ICONS={like:{icon:'fa-solid fa-thumbs-up',bg:'#1877f2'},comment:{icon:'fa-solid fa-comment',bg:'#43e97b'},follow:{icon:'fa-solid fa-user-plus',bg:'#ff6584'}};
    el.innerHTML=items.map(n=>{
        const cfg=ICONS[n.tipo]||{icon:'fa-solid fa-bell',bg:'var(--accent)'};
        const thumb=n.postImagen?`<img class="notif-thumb" src="${n.postImagen}" onerror="this.style.display='none'">`:'';
        const dot=n.leida?'':`<div class="notif-dot"></div>`;
        return `<div class="notif-item ${n.leida?'':'unread'}" onclick="handleNotifClick('${n.key}','${n.tipo}','${n.postId||''}')">
            <div class="notif-avatar-wrap"><img class="notif-avatar" src="${n.fromAvatar||'default-avatar.png'}" onerror="this.src='default-avatar.png'"><div class="notif-icon-badge" style="background:${cfg.bg}"><i class="${cfg.icon}"></i></div></div>
            <div class="notif-body"><div class="notif-text">${buildNotifText(n)}</div><div class="notif-time">${timeAgo(n.timestamp)}</div></div>${thumb}${dot}</div>`;
    }).join('');
    setTimeout(()=>markAllRead(false),2000);
}

function buildNotifText(n) {
    const name=`<strong>${n.fromName||'Alguien'}</strong>`;
    switch(n.tipo){case'like':return`${name} le dio Me gusta a tu publicación 👍`;case'comment':return`${name} comentó: <em>"${(n.comentario||'').slice(0,60)}${(n.comentario||'').length>60?'…':''}"</em>`;case'follow':return`${name} empezó a seguirte 🎉`;default:return`${name} interactuó contigo`;}
}

window.markAllRead = async function(feedback=true) {
    if(!currentUser) return;
    const snap=await get(ref(db,`notificaciones/${currentUser.uid}`));
    if(!snap.exists()) return;
    await Promise.all(Object.keys(snap.val()).map(k=>set(ref(db,`notificaciones/${currentUser.uid}/${k}/leida`),true)));
    if(feedback){loadNotifList();showToast('✅ Todo marcado como leído');}
    document.getElementById('notif-badge')?.classList.remove('show');
};

window.handleNotifClick = async function(key, tipo, postId) {
    if(currentUser&&key) await set(ref(db,`notificaciones/${currentUser.uid}/${key}/leida`),true);
    if(tipo==='follow'){document.querySelector('.sheet-overlay')?.remove();return;}
    if(postId&&postId!=='undefined'){document.querySelector('.sheet-overlay')?.remove();if(tipo==='comment')openCommentSheet(postId);}
};

window.writeNotif = async function(toUid, tipo, extra={}) {
    if(!currentUser||toUid===currentUser.uid) return;
    await push(ref(db,`notificaciones/${toUid}`),{tipo,fromUid:currentUser.uid,fromName:currentUser.displayName||'Usuario',fromAvatar:currentUser.photoURL||'',timestamp:Date.now(),leida:false,...extra});
};

// ════════════════════════════════════════════════════════
//  AUTH — punto de entrada, se ejecuta UNA SOLA VEZ
// ════════════════════════════════════════════════════════
let _initialized = false;

onAuthStateChanged(auth, async user => {
    if (!user) { location.href = 'index.html'; return; }
    currentUser = user;
    document.getElementById('compose-avatar').src = user.photoURL || 'default-avatar.png';

    if (tursoOK) {
        try { await sincronizarUsuario(user); } catch(e) { console.warn('Turso sync:', e); }
    }

    if (!_initialized) {
        _initialized = true;
        initFeed();
        loadStories();
        listenNotifications(user.uid);
    }
});
</script>
