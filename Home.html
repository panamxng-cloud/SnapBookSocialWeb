window.openCanalPanel = async function(uid, autorFallback, avatarFallback) {
    if (!uid) return;
    document.getElementById('canal-panel')?.remove();

    const panel = document.createElement('div');
    panel.id = 'canal-panel';
    panel.style.cssText = 'position:fixed;inset:0;z-index:9997;background:var(--bg);display:flex;flex-direction:column;animation:fadeIn 0.25s ease;overflow:hidden;';

    // Skeleton mientras carga
    panel.innerHTML = `
    <div style="background:var(--header-bg);backdrop-filter:blur(20px);padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0;">
        <div onclick="closeCanalPanel()" style="width:38px;height:38px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text);font-size:17px;cursor:pointer;flex-shrink:0;">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
        <div style="font-size:17px;font-weight:800;flex:1;" id="cp-header-name">${autorFallback || 'Canal'}</div>
    </div>
    <div style="flex:1;overflow-y:auto;scrollbar-width:none;" id="cp-body">
        <div style="text-align:center;padding:60px 24px;color:var(--text-muted);">
            <i class="fa-solid fa-circle-notch fa-spin" style="font-size:28px;"></i>
        </div>
    </div>`;

    document.body.appendChild(panel);

    try {
        // Cargar datos del usuario
        const userSnap = await get(ref(db, `usuarios/${uid}`));
        const u = userSnap.exists() ? userSnap.val() : {};
        const nombre  = u.nombre || u.displayName || autorFallback || 'Usuario';
        const avatar  = u.photoURL || u.avatar || u.avatarUrl || avatarFallback || `https://ui-avatars.com/api/?name=${encodeURIComponent(nombre)}&background=6c63ff&color=fff&size=160`;
        const handle  = u.username || nombre.toLowerCase().replace(/\s+/g,'');
        const bio     = u.bio || u.descripcion || '';
        const banner  = u.bannerUrl || u.banner || '';

        // Seguidores
        const segSnap = await get(ref(db, `seguidores/${uid}`));
        const numSeg  = segSnap.exists() ? Object.keys(segSnap.val()).length : 0;

        // Estado de seguimiento
        let siguiendo = false;
        if (currentUser && uid !== currentUser.uid) {
            const fs = await get(ref(db, `siguiendo/${currentUser.uid}/${uid}`)).catch(()=>null);
            siguiendo = !!fs?.exists();
        }
        const isOwn = currentUser?.uid === uid;

        // Videos del canal
        const videos = [];
        const mvSnap = await get(ref(db, 'MultiVideos')).catch(()=>null);
        if (mvSnap?.exists()) {
            mvSnap.forEach(section => {
                const val = section.val();
                if (val && typeof val === 'object') {
                    // Nodo anidado (ej: canal/{id})
                    Object.entries(val).forEach(([key, v]) => {
                        if (v && typeof v === 'object' && v.uid === uid) {
                            const hv = v.videoUrl || v.video_url || v.cloudinaryUrl;
                            if (hv) videos.push({ id: key, ...v, videoUrl: hv });
                        }
                    });
                    // Nodo plano
                    if (val.uid === uid) {
                        const hv = val.videoUrl || val.video_url || val.cloudinaryUrl;
                        if (hv && !videos.find(x => x.id === section.key))
                            videos.push({ id: section.key, ...val, videoUrl: hv });
                    }
                }
            });
        }
        videos.sort((a,b) => Number(b.createdAt||b.timestamp||0) - Number(a.createdAt||a.timestamp||0));

        // Actualizar header
        document.getElementById('cp-header-name').textContent = nombre;

        // Renderizar cuerpo
        document.getElementById('cp-body').innerHTML = `

        <!-- BANNER -->
        <div style="width:100%;height:120px;background:linear-gradient(135deg,var(--accent),var(--accent2));overflow:hidden;flex-shrink:0;">
            ${banner ? `<img src="${banner}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.style.display='none'">` : ''}
        </div>

        <!-- INFO CANAL -->
        <div style="background:var(--surface);padding:0 16px 16px;border-bottom:1px solid var(--border);">
            <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-top:-30px;margin-bottom:12px;">
                <img src="${avatar}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(nombre)}&background=6c63ff&color=fff&size=160'"
                    style="width:76px;height:76px;border-radius:50%;object-fit:cover;border:4px solid var(--surface);background:var(--surface3);">
            </div>
            <div style="font-size:20px;font-weight:800;color:var(--text);">${nombre}</div>
            <div style="font-size:13px;color:var(--text-muted);margin-bottom:10px;">@${handle}</div>

            <!-- Stats -->
            <div style="display:flex;gap:20px;margin-bottom:14px;">
                <div style="text-align:center;">
                    <div style="font-size:16px;font-weight:800;color:var(--text);" id="cp-subs">${fmtViews(numSeg)}</div>
                    <div style="font-size:11px;color:var(--text-muted);font-weight:600;">Seguidores</div>
                </div>
                <div style="text-align:center;">
                    <div style="font-size:16px;font-weight:800;color:var(--text);">${fmtViews(videos.length)}</div>
                    <div style="font-size:11px;color:var(--text-muted);font-weight:600;">Videos</div>
                </div>
            </div>

            ${bio ? `<div style="font-size:14px;color:var(--text-muted);line-height:1.55;margin-bottom:14px;">${bio}</div>` : ''}

            <!-- Botones -->
            ${!isOwn ? `
            <div style="display:flex;gap:8px;">
                <button id="cp-follow-btn" onclick="cpToggleFollow('${uid}')"
                    style="flex:1;padding:10px 16px;border-radius:22px;border:${siguiendo ? '1.5px solid var(--border)' : 'none'};
                    background:${siguiendo ? 'var(--surface2)' : 'var(--accent)'};
                    color:${siguiendo ? 'var(--text)' : '#fff'};
                    font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;
                    display:flex;align-items:center;justify-content:center;gap:7px;transition:all 0.2s;">
                    <i class="fa-solid ${siguiendo ? 'fa-check' : 'fa-plus'}" id="cp-follow-icon"></i>
                    <span id="cp-follow-text">${siguiendo ? 'Siguiendo' : 'Seguir'}</span>
                </button>
                <div onclick="cpShare('${nombre}','${uid}')"
                    style="width:42px;height:42px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface2);
                    display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:16px;cursor:pointer;flex-shrink:0;">
                    <i class="fa-solid fa-share-nodes"></i>
                </div>
            </div>` : ''}
        </div>

        <!-- VIDEOS -->
        <div style="padding:12px;">
            <div style="font-size:15px;font-weight:800;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:7px;">
                <i class="fa-solid fa-play" style="color:var(--accent);font-size:13px;"></i> Videos
            </div>
            ${videos.length ? videos.map(v => {
                const thumb  = v.thumbnail || v.thumbnailUrl || '';
                const titulo = v.titulo || v.contenido || 'Sin título';
                const views  = v.vistas ? fmtViews(v.vistas)+' vistas' : '';
                const ago    = timeAgo(Number(v.createdAt||v.timestamp||0));
                const dur    = v.duracion ? `${Math.floor(v.duracion/60)}:${String(v.duracion%60).padStart(2,'0')}` : '';
                const safe   = JSON.stringify(JSON.stringify(v));
                return `<div onclick="openMV(${safe})"
                    style="background:var(--surface);border-radius:14px;overflow:hidden;border:1px solid var(--border);
                    box-shadow:var(--card-shadow);margin-bottom:10px;cursor:pointer;display:flex;gap:0;flex-direction:column;">
                    <div style="position:relative;width:100%;aspect-ratio:16/9;background:#111;overflow:hidden;">
                        ${thumb
                            ? `<img src="${thumb}" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy">`
                            : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#1a1a24;"><i class="fa-solid fa-play" style="color:#fff;font-size:28px;opacity:.3;"></i></div>`}
                        ${dur ? `<div style="position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,0.82);color:#fff;font-size:11px;font-weight:800;border-radius:5px;padding:2px 6px;">${dur}</div>` : ''}
                    </div>
                    <div style="padding:10px 12px 12px;">
                        <div style="font-size:14px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${titulo}</div>
                        <div style="font-size:12px;color:var(--text-muted);">${views}${views&&ago?' · ':''}${ago}</div>
                    </div>
                </div>`;
            }).join('') : `<div style="text-align:center;padding:40px 24px;color:var(--text-muted);">
                <i class="fa-solid fa-video-slash" style="font-size:36px;display:block;margin-bottom:12px;opacity:.2;"></i>
                <p style="font-size:15px;font-weight:700;">Sin videos aún</p>
            </div>`}
        </div>`;

    } catch(e) {
        console.error('openCanalPanel:', e);
        document.getElementById('cp-body').innerHTML = `<div style="text-align:center;padding:60px 24px;color:var(--text-muted);">
            <i class="fa-solid fa-triangle-exclamation" style="font-size:32px;display:block;margin-bottom:12px;opacity:.3;"></i>
            <p>Error al cargar el canal</p></div>`;
    }
};

window.closeCanalPanel = function() {
    document.getElementById('canal-panel')?.remove();
};

window.cpToggleFollow = async function(uid) {
    if (!currentUser) { showToast('Inicia sesión para seguir'); return; }
    const btn  = document.getElementById('cp-follow-btn');
    const icon = document.getElementById('cp-follow-icon');
    const text = document.getElementById('cp-follow-text');
    const fR   = ref(db, `siguiendo/${currentUser.uid}/${uid}`);
    const sR   = ref(db, `seguidores/${uid}/${currentUser.uid}`);
    const s    = await get(fR);
    if (s.exists()) {
        await remove(fR); await remove(sR);
        btn.style.background = 'var(--surface2)'; btn.style.color = 'var(--text)'; btn.style.border = '1.5px solid var(--border)';
        if (icon) icon.className = 'fa-solid fa-plus';
        if (text) text.textContent = 'Seguir';
        showToast('Dejaste de seguir');
    } else {
        await set(fR, true); await set(sR, true);
        btn.style.background = 'var(--accent)'; btn.style.color = '#fff'; btn.style.border = 'none';
        if (icon) icon.className = 'fa-solid fa-check';
        if (text) text.textContent = 'Siguiendo';
        writeNotif(uid, 'follow');
        showToast('✅ Ahora lo sigues');
    }
    const seg = await get(ref(db, `seguidores/${uid}`)).catch(()=>null);
    const n   = seg?.exists() ? Object.keys(seg.val()).length : 0;
    const el  = document.getElementById('cp-subs');
    if (el) el.textContent = fmtViews(n);
};

window.cpShare = function(nombre, uid) {
    if (navigator.share) navigator.share({ title: nombre, url: location.href });
    else { navigator.clipboard?.writeText(location.href); showToast('🔗 Link copiado'); }
};

        // Estado suscripción
        if (currentUser && uid !== currentUser.uid) {
            const fSnap = await get(ref(db, `siguiendo/${currentUser.uid}/${uid}`)).catch(() => null);

        // Avatar del usuario que comenta
        const cmtAv = document.getElementById('cs-cmt-av');
        if (cmtAv && currentUser?.photoURL) cmtAv.src = currentUser.photoURL;

        // ── Cargar videos del canal ──
        const mvSnap = await get(ref(db, 'MultiVideos')).catch(() => null);
        const videos = [];
        if (mvSnap?.exists()) {
            mvSnap.forEach(c => {
                const v = c.val();
                const processV = (key, val, parentKey) => {
                    const hasVideo = val.videoUrl || val.video_url || val.cloudinaryUrl;
                    if (hasVideo && (val.uid === uid || val.authorUid === uid)) {
                        const fullPath = parentKey ? `MultiVideos/${parentKey}/${key}` : `MultiVideos/${key}`;
                        videos.push({ id: key, ...val,
                            videoUrl: val.videoUrl || val.video_url || val.cloudinaryUrl,
                            _node: 'MultiVideos', _path: fullPath });
                    }
                };
                if (v && typeof v === 'object' && !v.videoUrl && !v.video_url && !v.cloudinaryUrl) {
                    Object.entries(v).forEach(([k2, val2]) => { if (val2 && typeof val2 === 'object') processV(k2, val2, c.key); });
                } else if (v) processV(c.key, v, null);
            });
        }
        videos.sort((a, b) => Number(b.timestamp || 0) - Number(a.timestamp || 0));

        if (!videos.length) {
            const listEl = document.getElementById('cs-channel-videos-list');
            if (listEl) listEl.innerHTML = `<div style="text-align:center;padding:32px;color:var(--text-muted);"><i class="fa-solid fa-video-slash" style="font-size:32px;display:block;margin-bottom:10px;opacity:.25;"></i><p style="font-weight:700;">Sin videos aún</p></div>`;
            return;
        }

        // Reproducir primer video y cargar lista
        _csLoadVideo(videos[0], nombre, avatar);
        _csLoadChannelVideos(videos, nombre, avatar);

        // Actualizar contador de videos en panel Canal
        const videosNumEl = document.getElementById('cs-canal-videos-num');
        if (videosNumEl) videosNumEl.textContent = videos.length;

    } catch(e) {
        console.error('openCanalSheet:', e);
    }
};

// ── Carga un video en el player y actualiza UI ───────────
window._csLoadVideo = function(v, canalNombre, canalAvatar) {
    if (!v) return;
    window._csCurrentVideo = v;
    const url    = v.videoUrl || v.video_url || v.cloudinaryUrl || '';
    const titulo = v.titulo   || v.contenido || v.texto || 'Video';
    const handle = canalNombre ? canalNombre.toLowerCase().replace(/\s+/g,'') : '';
    const views  = v.vistas   ? fmtViews(v.vistas) + ' vistas' : '';
    const ago    = v.timestamp ? timeAgo(Number(v.timestamp)) : '';
    const likes  = v.likes    ? Object.keys(v.likes).length : (Number(v.total_likes)||0);

    // Player
    const vid = document.getElementById('cs-vid');
    if (vid && url) { vid.src = url; vid.play().catch(() => {}); }

    // Title / meta
    const tEl  = document.getElementById('cs-title-txt');
    const hdEl = document.getElementById('cs-handle-txt');
    const vwEl = document.getElementById('cs-views-txt');
    const agEl = document.getElementById('cs-ago-txt');
    const sepEl = document.getElementById('cs-ago-sep');
    if (tEl)  tEl.textContent  = titulo;
    if (hdEl) hdEl.textContent = handle;
    if (vwEl) vwEl.textContent = views;
    if (agEl) agEl.textContent = ago;
    if (sepEl) sepEl.style.display = (views && ago) ? '' : 'none';

    // Descripción
    const desc = v.descripcion || v.description || v.desc || '';
    const descWrap = document.getElementById('cs-desc-wrap');
    const descPrev = document.getElementById('cs-desc-preview');
    const descMore = document.getElementById('cs-desc-more');
    const descFull = document.getElementById('cs-desc-full');
    if (desc && descWrap && descPrev) {
        descWrap.style.display = 'block';
        descPrev.textContent = desc;
        if (descFull) descFull.textContent = desc;
        // Mostrar "...más" si el texto es largo (más de 100 chars)
        if (descMore) descMore.style.display = desc.length > 100 ? 'inline' : 'none';
    } else if (descWrap) {
        descWrap.style.display = 'none';
    }

    // Like count — leer desde Firebase para tener el dato real
    const lcEl = document.getElementById('cs-like-cnt');
    if (lcEl) lcEl.textContent = likes > 0 ? fmtViews(likes) : '0';
    if (v.id) {
        const likePath = v._path || `MultiVideos/${v.id}`;
        get(ref(db, `${likePath}/likes`)).then(snap => {
            const n = snap?.exists() ? Object.keys(snap.val()).length : 0;
            if (lcEl) lcEl.textContent = n > 0 ? fmtViews(n) : '0';
        }).catch(() => {});
    }

    // Reset like/dislike state
    document.getElementById('cs-like-btn')?.classList.remove('liked');
    document.getElementById('cs-dislike-btn')?.classList.remove('liked');
    const likeI = document.querySelector('#cs-like-btn i');
    if (likeI) likeI.className = 'fa-regular fa-thumbs-up';
    const dislikeI = document.querySelector('#cs-dislike-btn i');
    if (dislikeI) dislikeI.className = 'fa-regular fa-thumbs-down';

    // Restaurar estado real del usuario desde Firebase
    if (currentUser && v.id) {
        const rPath = v._path || `MultiVideos/${v.id}`;
        Promise.all([
            get(ref(db, `${rPath}/likes/${currentUser.uid}`)).catch(() => null),
            get(ref(db, `${rPath}/dislikes/${currentUser.uid}`)).catch(() => null)
        ]).then(([likeSnap, dislikeSnap]) => {
            const likeBtn    = document.getElementById('cs-like-btn');
            const dislikeBtn = document.getElementById('cs-dislike-btn');
            const likeIco    = likeBtn?.querySelector('i');
            const dislikeIco = dislikeBtn?.querySelector('i');
            if (likeSnap?.exists()) {
                likeBtn?.classList.add('liked');
                if (likeIco) likeIco.className = 'fa-solid fa-thumbs-up';
            }
            if (dislikeSnap?.exists()) {
                dislikeBtn?.classList.add('liked');
                if (dislikeIco) dislikeIco.className = 'fa-solid fa-thumbs-down';
            }
        });
    }

    // Actualizar contador de comentarios en el botón
    get(ref(db, `comentarios/${v.id}`)).then(snap => {
        const n = snap?.exists() ? Object.keys(snap.val()).length : 0;
        const previewEl = document.getElementById('cs-cmt-preview-count');
        if (previewEl) previewEl.textContent = `${n} comentario${n!==1?'s':''}`;
    }).catch(() => {});
};

// ── Tabs Videos | Canal ─────────────────────────────────
window.csSwitchCsTab = function(tab) {
    const tabVideos  = document.getElementById('cs-tab-videos');
    const tabCanal   = document.getElementById('cs-tab-canal');
    const panelVideos = document.getElementById('cs-panel-videos');
    const panelCanal  = document.getElementById('cs-panel-canal');
    const active = 'color:var(--accent);border-bottom:3px solid var(--accent);margin-bottom:-2px;';
    const inactive = 'color:var(--text-muted);border-bottom:3px solid transparent;margin-bottom:-2px;';
    if (tab === 'videos') {
        tabVideos.style.cssText += active;
        tabCanal.style.cssText  += inactive;
        tabVideos.style.color = 'var(--accent)';
        tabCanal.style.color  = 'var(--text-muted)';
        tabVideos.style.borderBottom = '3px solid var(--accent)';
        tabCanal.style.borderBottom  = '3px solid transparent';
        panelVideos.style.display = 'block';
        panelCanal.style.display  = 'none';
    } else {
        tabVideos.style.color = 'var(--text-muted)';
        tabCanal.style.color  = 'var(--accent)';
        tabVideos.style.borderBottom = '3px solid transparent';
        tabCanal.style.borderBottom  = '3px solid var(--accent)';
        panelVideos.style.display = 'none';
        panelCanal.style.display  = 'block';
    }
};

// Poblar panel Canal con datos del usuario
window._csFillCanalPanel = function(nombre, avatar, nsubs, descripcion, extra) {
    // Avatar
    const avEl = document.getElementById('cs-canal-av-big');
    if (avEl) { avEl.src = avatar || 'default-avatar.png'; avEl.onerror = () => avEl.src = 'default-avatar.png'; }

    // Nombre y handle
    const nmEl  = document.getElementById('cs-canal-name-big');
    const hdEl  = document.getElementById('cs-canal-handle-big');
    if (nmEl) nmEl.textContent = nombre || 'Canal';
    if (hdEl) hdEl.textContent = nombre ? nombre.toLowerCase().replace(/\s+/g,'') : '';

    // Contadores
    const subsNumEl   = document.getElementById('cs-canal-subs-num');
    const videosNumEl = document.getElementById('cs-canal-videos-num');
    if (subsNumEl)   subsNumEl.textContent   = fmtViews(nsubs);
    if (videosNumEl) videosNumEl.textContent = extra?.totalVideos ?? '—';

    // Botón suscribir — sincronizar estado
    const fBtn = document.getElementById('cs-canal-follow-btn');
    if (fBtn) {
        const uid = window._csCurrentUid;
        if (uid && typeof currentUser !== 'undefined' && currentUser?.uid === uid) {
            fBtn.style.display = 'none';
        } else {
            fBtn.style.display = 'block';
        }
    }

    // Descripción
    const descWrap = document.getElementById('cs-canal-desc-wrap');
    const descEl   = document.getElementById('cs-canal-desc-big');
    const descMore = document.getElementById('cs-canal-desc-more');
    if (descripcion && descWrap && descEl) {
        descWrap.style.display = 'block';
        descEl.textContent = descripcion;
        // Guardar para panel completo
        window._csCurrentCanalDesc = descripcion;
        if (descMore) descMore.style.display = descripcion.length > 120 ? 'inline' : 'none';
    } else if (descWrap) {
        descWrap.style.display = 'none';
    }

    // Links extra
    const linksEl = document.getElementById('cs-canal-links');
    if (linksEl && extra?.sitio) {
        linksEl.innerHTML = `<a href="${extra.sitio}" target="_blank" style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--accent);text-decoration:none;font-weight:600;"><i class="fa-solid fa-link"></i>${extra.sitio}</a>`;
    } else if (linksEl) {
        linksEl.innerHTML = '';
    }
};

window.csOpenDescFromCanal = function() {
    const descFull = document.getElementById('cs-desc-full');
    if (descFull) descFull.textContent = window._csCurrentCanalDesc || '';
    document.getElementById('cs-desc-panel').style.display = 'block';
};

// ── Panel de descripción ─────────────────────────────────
window.csOpenDescPanel = function() {
    document.getElementById('cs-desc-panel').style.display = 'block';
};
window.csCloseDescPanel = function(e) {
    if (!e || e.target === document.getElementById('cs-desc-panel')) {
        document.getElementById('cs-desc-panel').style.display = 'none';
    }
};

// ── Panel de comentarios ──────────────────────────────────
window.csOpenCommentPanel = function() {
    const panel = document.getElementById('cs-cmt-panel');
    if (panel) panel.style.display = 'block';
    const v = window._csCurrentVideo;
    if (v?.id) _csLoadComments(v.id);
    // mover avatar del usuario
    const av = document.getElementById('cs-cmt-av');
    if (av && typeof currentUser !== 'undefined' && currentUser?.photoURL) av.src = currentUser.photoURL;
};

window.csCloseCommentPanel = function(e) {
    if (!e || e.target === document.getElementById('cs-cmt-panel') || e.currentTarget === e.target) {
        document.getElementById('cs-cmt-panel').style.display = 'none';
    }
};

// ── Cargar lista de videos del canal ──────────────────────
window._csLoadChannelVideos = async function(videos, canalNombre, canalAvatar) {
    const listEl = document.getElementById('cs-channel-videos-list');
    if (!listEl) return;
    if (!videos.length) {
        listEl.innerHTML = `<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:14px;">Sin más videos</div>`;
        return;
    }
    listEl.innerHTML = videos.map((v, i) => {
        const titulo = v.titulo || v.contenido || v.texto || 'Video';
        const thumb  = v.thumbnailUrl || v.thumbnail || '';
        const views  = v.vistas ? fmtViews(v.vistas) + ' vistas' : '';
        const ago    = v.timestamp ? timeAgo(Number(v.timestamp)) : '';
        const isActive = i === 0;
        return `<div onclick="window._csLoadVideo(${JSON.stringify(v).replace(/"/g,'&quot;')}, '${canalNombre}', '${canalAvatar}')" style="display:flex;gap:10px;padding:10px 14px;cursor:pointer;background:${isActive?'var(--surface2)':'transparent'};transition:background 0.15s;border-radius:12px;margin:0 8px;">
          <div style="width:100px;height:58px;border-radius:8px;background:#111;overflow:hidden;flex-shrink:0;position:relative;">
            ${thumb ? `<img src="${thumb}" style="width:100%;height:100%;object-fit:cover;">` : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#1a1a24;"><i class="fa-solid fa-play" style="color:rgba(255,255,255,0.3);font-size:18px;"></i></div>`}
          </div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;font-weight:700;color:var(--text);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${titulo}</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">${[views,ago].filter(Boolean).join(' • ')}</div>
          </div>
        </div>`;
    }).join('');
};

// ── Comentarios ──────────────────────────────────────────
async function _csLoadComments(postId) {
    const el = document.getElementById('cs-cmt-panel-list');
    if (!el) return;
    try {
        const snap = await get(ref(db, `comentarios/${postId}`)).catch(() => null);
        const cntEl = document.getElementById('cs-cmt-panel-count');
        const previewEl = document.getElementById('cs-cmt-preview-count');
        if (!snap?.exists()) {
            if (cntEl) cntEl.textContent = '';
            if (previewEl) previewEl.textContent = '0 comentarios';
            el.innerHTML = `<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:14px;">Sin comentarios aún. ¡Sé el primero!</div>`;
            return;
        }
        const arr = []; snap.forEach(c => arr.push(c.val())); arr.sort((a,b) => a.timestamp - b.timestamp);
        if (cntEl) cntEl.textContent = ` ${arr.length}`;
        if (previewEl) previewEl.textContent = `${arr.length} comentario${arr.length!==1?'s':''}`;
        el.innerHTML = arr.map(c => `
            <div class="cs-cmt-item">
                <img class="cs-cmt-uav" src="${c.avatar||'default-avatar.png'}" onerror="this.src='default-avatar.png'">
                <div class="cs-cmt-body">
                    <div class="cs-cmt-author">${c.autor||'Usuario'} <span style="font-weight:400;color:var(--text-muted);font-size:11px;">${timeAgo(c.timestamp)}</span></div>
                    <div class="cs-cmt-text">${c.texto}</div>
                    <div class="cs-cmt-likes">
                        <i class="fa-regular fa-thumbs-up" style="font-size:13px;"></i>
                        <span>${c.likes ? Object.keys(c.likes).length : 0}</span>
                        <i class="fa-regular fa-thumbs-down" style="font-size:13px;margin-left:8px;"></i>
                    </div>
                </div>
            </div>`).join('');
    } catch(e) {
        el.innerHTML = `<div style="padding:16px;color:var(--text-muted);font-size:14px;">Error al cargar comentarios</div>`;
    }
}

window.csSendCmt = async function() {
    const inp = document.getElementById('cs-cmt-box');
    const txt = inp?.value.trim();
    const v   = window._csCurrentVideo;
    if (!txt || !currentUser || !v?.id) { if (!currentUser) showToast('Inicia sesión'); return; }
    inp.value = '';
    await push(ref(db, `comentarios/${v.id}`), {
        autor: currentUser.displayName || 'Usuario',
        avatar: currentUser.photoURL || '',
        uid: currentUser.uid, texto: txt, timestamp: Date.now()
    });
    _csLoadComments(v.id);
    showToast('💬 Comentario enviado');
};

// ── Like / Dislike ───────────────────────────────────────
window.csLike = async function() {
    if (!currentUser) { showToast('Inicia sesión para reaccionar'); return; }
    const v = window._csCurrentVideo;
    if (!v?.id) return;

    const likeBtn  = document.getElementById('cs-like-btn');
    const likeIcon = likeBtn?.querySelector('i');
    const cnt      = document.getElementById('cs-like-cnt');
    const alreadyLiked = likeBtn?.classList.contains('liked');

    // Animación optimista inmediata
    likeBtn?.classList.toggle('liked', !alreadyLiked);
    if (likeIcon) likeIcon.className = alreadyLiked ? 'fa-regular fa-thumbs-up' : 'fa-solid fa-thumbs-up';

    // Si daba like → quitarlo; si no → agregarlo y quitar dislike
    const basePath   = v._path || `MultiVideos/${v.id}`;
    const likeRef    = ref(db, `${basePath}/likes/${currentUser.uid}`);
    const dislikeRef = ref(db, `${basePath}/dislikes/${currentUser.uid}`);

    if (alreadyLiked) {
        await remove(likeRef).catch(() => {});
    } else {
        await set(likeRef, true).catch(() => {});
        // Quitar dislike si existía
        await remove(dislikeRef).catch(() => {});
        const dislikeBtn  = document.getElementById('cs-dislike-btn');
        const dislikeIcon = dislikeBtn?.querySelector('i');
        dislikeBtn?.classList.remove('liked');
        if (dislikeIcon) dislikeIcon.className = 'fa-regular fa-thumbs-down';
    }

    // Actualizar contador real desde Firebase
    const all = await get(ref(db, `${basePath}/likes`)).catch(() => null);
    const n   = all?.exists() ? Object.keys(all.val()).length : 0;
    if (cnt) cnt.textContent = n > 0 ? fmtViews(n) : '0';
};

window.csDislike = async function() {
    if (!currentUser) { showToast('Inicia sesión para reaccionar'); return; }
    const v = window._csCurrentVideo;
    if (!v?.id) return;

    const dislikeBtn  = document.getElementById('cs-dislike-btn');
    const dislikeIcon = dislikeBtn?.querySelector('i');
    const alreadyDisliked = dislikeBtn?.classList.contains('liked');

    // Animación optimista inmediata
    dislikeBtn?.classList.toggle('liked', !alreadyDisliked);
    if (dislikeIcon) dislikeIcon.className = alreadyDisliked ? 'fa-regular fa-thumbs-down' : 'fa-solid fa-thumbs-down';

    const basePath2  = v._path || `MultiVideos/${v.id}`;
    const dislikeRef = ref(db, `${basePath2}/dislikes/${currentUser.uid}`);
    const likeRef    = ref(db, `${basePath2}/likes/${currentUser.uid}`);

    if (alreadyDisliked) {
        await remove(dislikeRef).catch(() => {});
    } else {
        await set(dislikeRef, true).catch(() => {});
        // Quitar like si existía
        await remove(likeRef).catch(() => {});
        const likeBtn  = document.getElementById('cs-like-btn');
        const likeIcon = likeBtn?.querySelector('i');
        const cnt      = document.getElementById('cs-like-cnt');
        likeBtn?.classList.remove('liked');
        if (likeIcon) likeIcon.className = 'fa-regular fa-thumbs-up';
        // Actualizar contador de likes
        const all = await get(ref(db, `${basePath2}/likes`)).catch(() => null);
        const n   = all?.exists() ? Object.keys(all.val()).length : 0;
        if (cnt) cnt.textContent = n > 0 ? fmtViews(n) : '0';
    }
};

window.csShare = function() {
    const v = window._csCurrentVideo;
    const title = v?.titulo || v?.contenido || 'Video';
    if (navigator.share) navigator.share({ title, url: location.href });
    else { navigator.clipboard?.writeText(location.href); showToast('🔗 Link copiado'); }
};

// ── csSwitchTab (kept for compatibility) ─────────────────
window.csSwitchTab = function() {};

window.closeCanalSheet = function() {
    const vid = document.getElementById('cs-vid');
    if (vid) { vid.pause(); vid.src = ''; }
    document.getElementById('canal-sheet-ov')?.remove();
};

function _csSetFollow(siguiendo) {
    const btn  = document.getElementById('cs-follow-btn');
    const icon = document.getElementById('cs-follow-icon');
    const text = document.getElementById('cs-follow-text');
    if (!btn) return;
    if (siguiendo) {
        btn.classList.add('siguiendo');
        if (icon) icon.className = 'fa-solid fa-bell-slash bell';
        if (text) text.textContent = 'Suscrito';
    } else {
        btn.classList.remove('siguiendo');
        if (icon) icon.className = 'fa-solid fa-bell bell';
        if (text) text.textContent = 'Suscribirse';
    }
}

window.csToggleFollow = async function(uid) {
    if (!currentUser) { showToast('Inicia sesión para suscribirte'); return; }
    const fR = ref(db, `siguiendo/${currentUser.uid}/${uid}`);
    const sR = ref(db, `seguidores/${uid}/${currentUser.uid}`);
    const s  = await get(fR);
    if (s.exists()) {
        await remove(fR); await remove(sR);
        _csSetFollow(false); showToast('Cancelaste tu suscripción');
    } else {
        await set(fR, true); await set(sR, true);
        _csSetFollow(true); writeNotif(uid, 'follow'); showToast('✅ ¡Suscrito al canal!');
    }
    const seg = await get(ref(db, `seguidores/${uid}`)).catch(() => null);
    const n   = seg?.exists() ? Object.keys(seg.val()).length : 0;
    const el  = document.getElementById('cs-subs');
    if (el) el.textContent = `${fmtViews(n)} suscriptor${n !== 1 ? 'es' : ''}`;
};
</script>
