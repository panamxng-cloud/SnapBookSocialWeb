<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SnapBook — Chats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/chats.css" />
</head>
<body>

<!-- ═══════════════════════ LISTA DE CHATS ═══════════════════════ -->
<div class="chat-app" id="chatApp">

  <!-- PANEL IZQUIERDO — Lista de conversaciones -->
  <div class="chat-list-panel" id="chatListPanel">

    <!-- Header -->
    <div class="chat-list-header">
      <h1 class="chat-list-title">Chats</h1>
      <div class="chat-list-actions">
        <button class="chat-icon-btn" id="newChatBtn" title="Nuevo chat">
          <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
        </button>
      </div>
    </div>

    <!-- Búsqueda -->
    <div class="chat-search-wrap">
      <div class="chat-search-box">
        <svg viewBox="0 0 24 24"><path d="M21.53 20.47l-4.8-4.8A8 8 0 1 0 15.72 17l4.8 4.8a.75.75 0 0 0 1.06-1.06zM4.5 11a6.5 6.5 0 1 1 13 0 6.5 6.5 0 0 1-13 0z"/></svg>
        <input type="text" id="chatSearchInput" placeholder="Buscar conversación..." />
      </div>
    </div>

    <!-- Tabs: Todos / No leídos -->
    <div class="chat-tabs">
      <button class="chat-tab active" data-tab="all">Todos</button>
      <button class="chat-tab" data-tab="unread">No leídos</button>
      <button class="chat-tab" data-tab="groups">Grupos</button>
    </div>

    <!-- Lista -->
    <div class="chat-list" id="chatList">
      <div class="chat-list-skeleton">
        <div class="skeleton-chat-item" style="animation-delay:0s"></div>
        <div class="skeleton-chat-item" style="animation-delay:.1s"></div>
        <div class="skeleton-chat-item" style="animation-delay:.2s"></div>
      </div>
    </div>
  </div>

  <!-- PANEL DERECHO — Conversación activa -->
  <div class="chat-room-panel" id="chatRoomPanel">

    <!-- Estado vacío (cuando no hay chat seleccionado) -->
    <div class="chat-empty-state" id="chatEmptyState">
      <div class="chat-empty-icon">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
      </div>
      <h2>Tus mensajes</h2>
      <p>Selecciona una conversación o inicia una nueva</p>
      <button class="btn-primary" id="startChatBtn">Nuevo mensaje</button>
    </div>

    <!-- Header del chat activo -->
    <div class="chat-room-header" id="chatRoomHeader" style="display:none">
      <button class="chat-back-btn" id="chatBackBtn">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <div class="chat-room-info" id="chatRoomInfo">
        <div class="chat-room-avatar-wrap">
          <img id="chatRoomAvatar" src="" alt="" class="chat-room-avatar" />
          <span class="chat-online-dot" id="chatOnlineDot"></span>
        </div>
        <div class="chat-room-meta">
          <span class="chat-room-name" id="chatRoomName">—</span>
          <span class="chat-room-status" id="chatRoomStatus">sin conexión</span>
        </div>
      </div>
      <div class="chat-room-actions">
        <button class="chat-icon-btn" id="callVoiceBtn" title="Llamada de voz">
          <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
        </button>
        <button class="chat-icon-btn" id="callVideoBtn" title="Videollamada">
          <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
        </button>
        <button class="chat-icon-btn" id="chatInfoBtn" title="Información">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
        </button>
      </div>
    </div>

    <!-- Mensajes -->
    <div class="chat-messages" id="chatMessages" style="display:none">
      <!-- Los mensajes se renderizan aquí dinámicamente -->
    </div>

    <!-- Typing indicator -->
    <div class="typing-indicator" id="typingIndicator" style="display:none">
      <div class="typing-avatar">
        <img id="typingAvatar" src="" alt="" />
      </div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- Input area -->
    <div class="chat-input-area" id="chatInputArea" style="display:none">

      <!-- Preview de reply -->
      <div class="reply-preview" id="replyPreview" style="display:none">
        <div class="reply-preview-bar"></div>
        <div class="reply-preview-content">
          <span class="reply-preview-name" id="replyPreviewName"></span>
          <span class="reply-preview-text" id="replyPreviewText"></span>
        </div>
        <button class="reply-preview-close" id="replyPreviewClose">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>

      <!-- Preview de imagen -->
      <div class="image-preview" id="imagePreview" style="display:none">
        <img id="imagePreviewImg" src="" alt="" />
        <button class="image-preview-close" id="imagePreviewClose">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>

      <div class="chat-input-row">
        <!-- Adjuntar -->
        <button class="chat-input-btn" id="attachBtn" title="Adjuntar">
          <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
        </button>
        <input type="file" id="fileInput" accept="image/*,video/*" style="display:none" />

        <!-- Emoji -->
        <button class="chat-input-btn" id="emojiBtn" title="Emoji">
          <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
        </button>

        <!-- Campo de texto -->
        <div class="chat-input-field" id="chatInputField" contenteditable="true" data-placeholder="Escribe un mensaje..."></div>

        <!-- Audio / Enviar -->
        <button class="chat-send-btn" id="sendBtn" title="Enviar">
          <svg class="send-icon" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
        <button class="chat-audio-btn" id="audioBtn" title="Nota de voz" style="display:none">
          <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
        </button>
      </div>

      <!-- Emoji picker -->
      <div class="emoji-picker" id="emojiPicker" style="display:none">
        <div class="emoji-picker-tabs">
          <button class="emoji-tab active" data-cat="smileys">😀</button>
          <button class="emoji-tab" data-cat="hearts">❤️</button>
          <button class="emoji-tab" data-cat="hands">👋</button>
          <button class="emoji-tab" data-cat="nature">🌿</button>
          <button class="emoji-tab" data-cat="food">🍕</button>
          <button class="emoji-tab" data-cat="activity">⚽</button>
          <button class="emoji-tab" data-cat="travel">✈️</button>
          <button class="emoji-tab" data-cat="objects">💡</button>
        </div>
        <div class="emoji-grid" id="emojiGrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════ MODAL: Nuevo Chat ═══════════════════════ -->
<div class="modal-overlay" id="newChatModal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3>Nuevo mensaje</h3>
      <button class="modal-close" id="newChatModalClose">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="modal-search">
      <input type="text" id="userSearchInput" placeholder="Buscar personas..." />
    </div>
    <div class="modal-list" id="userSearchResults">
      <p class="modal-hint">Busca a alguien para chatear</p>
    </div>
  </div>
</div>

<!-- ═══════════════════════ MODAL: Info del Chat ═══════════════════════ -->
<div class="modal-overlay" id="chatInfoModal" style="display:none">
  <div class="modal modal-right">
    <div class="modal-header">
      <h3>Información</h3>
      <button class="modal-close" id="chatInfoModalClose">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="chat-info-body" id="chatInfoBody"></div>
  </div>
</div>

<!-- ═══════════════════════ MODAL: Grabando Audio ═══════════════════════ -->
<div class="modal-overlay" id="audioModal" style="display:none">
  <div class="modal modal-small">
    <div class="audio-recording">
      <div class="audio-pulse"></div>
      <span class="audio-timer" id="audioTimer">0:00</span>
      <p>Grabando nota de voz...</p>
      <div class="audio-controls">
        <button class="btn-danger" id="audioCancelBtn">Cancelar</button>
        <button class="btn-primary" id="audioSendBtn">Enviar</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════ TOAST ═══════════════════════ -->
<div class="toast-container" id="toastContainer"></div>

<!-- ═══════════════════════ NAV INFERIOR ═══════════════════════ -->
<nav class="bottom-nav">
  <button class="bottom-tab" onclick="location.href='Home.html'">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
  </button>
  <button class="bottom-tab" onclick="location.href='shorts.html'">
    <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
  </button>
  <button class="bottom-tab tab-center" onclick="location.href='create-posts.html'">
    <div class="tab-special">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </div>
  </button>
  <button class="bottom-tab active">
    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    <span class="bottom-badge" id="chatsBadge" style="display:none">0</span>
  </button>
  <button class="bottom-tab" onclick="location.href='Profile.html'">
    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
  </button>
</nav>

<script type="module" src="../logicas/chats.js"></script>
</body>
</html>
