<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SnapBook — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/Home.css" />
</head>
<body>

<!-- ═══════════════════════ TOP NAV ═══════════════════════ -->
<nav class="top-nav">
  <a href="#" class="nav-logo">SnapBook</a>
  <div class="nav-actions">

    <button class="nav-btn" title="Buscar" onclick="location.href='explore.html'">
      <svg viewBox="0 0 24 24">
        <path d="M21.53 20.47l-4.8-4.8A8 8 0 1 0 15.72 17l4.8 4.8a.75.75 0 0 0 1.06-1.06zM4.5 11a6.5 6.5 0 1 1 13 0 6.5 6.5 0 0 1-13 0z"/>
      </svg>
    </button>

    <button class="nav-btn" title="Notificaciones" onclick="location.href='notifications.html'" style="position:relative">
      <svg viewBox="0 0 24 24">
        <path d="M12 2a7 7 0 0 1 7 7v4.586l1.707 1.707A1 1 0 0 1 20 17H4a1 1 0 0 1-.707-1.707L5 13.586V9a7 7 0 0 1 7-7zm0 20a3 3 0 0 1-2.83-2h5.66A3 3 0 0 1 12 22z"/>
      </svg>
      <span class="nav-badge" id="notifBadge" style="display:none">3</span>
    </button>



  </div>
</nav>

<!-- ═══════════════════════ MAIN ═══════════════════════ -->
<main id="mainContent">

  <!-- ── COMPOSE BOX ── -->
  <div class="compose-box">
    <div class="compose-row">
      <img id="composeAvatar" src="" alt="Tú" class="compose-avatar" />
      <div class="compose-input" id="composeInput">
        ¿Qué estás pensando, <span id="composeName">amigo</span>? 😊
      </div>
    </div>
    <div class="compose-actions">
      <button class="compose-action photo" onclick="location.href='create-posts.html?type=photo'">
        <svg viewBox="0 0 24 24">
          <path d="M21 3H3a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-9 13.5A5.5 5.5 0 1 1 17.5 11 5.5 5.5 0 0 1 12 16.5zM12 8a3.5 3.5 0 1 0 3.5 3.5A3.5 3.5 0 0 0 12 8z"/>
        </svg>
        Foto/Video
      </button>
      <button class="compose-action live" onclick="location.href='create-posts.html?type=live'">
        <svg viewBox="0 0 24 24">
          <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0-10C6.48 4 2 8.48 2 14h2c0-4.42 3.58-8 8-8s8 3.58 8 8h2c0-5.52-4.48-10-10-10zm0 4c-3.31 0-6 2.69-6 6h2c0-2.21 1.79-4 4-4s4 1.79 4 4h2c0-3.31-2.69-6-6-6z"/>
        </svg>
        Live
      </button>
      <button class="compose-action checkin" onclick="location.href='create-posts.html?type=checkin'">
        <svg viewBox="0 0 24 24">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
        Check in
      </button>
    </div>
  </div>

  <!-- ── STORIES ── -->
  <div class="stories-section">
    <div class="stories-scroll" id="storiesContainer">

      <!-- Botón fijo "Tu historia" -->
      <button class="story-add" id="addStoryBtn">
        <div class="story-add-icon">
          <svg viewBox="0 0 24 24">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
          </svg>
        </div>
        <span>Tu historia</span>
      </button>

      <!-- Historias dinámicas insertadas por Home.js -->

    </div>
  </div>

  <!-- ── FEED ── -->
  <div id="feedContainer">

    <!-- Skeleton 1 -->
    <div class="skeleton-card" id="skel1">
      <div class="skeleton-header">
        <div class="skeleton skeleton-avatar"></div>
        <div class="skeleton-text">
          <div class="skeleton skeleton-line" style="width:60%"></div>
          <div class="skeleton skeleton-line" style="width:40%"></div>
        </div>
      </div>
      <div class="skeleton skeleton-line" style="width:80%"></div>
      <div class="skeleton skeleton-line" style="width:60%;margin-bottom:12px"></div>
      <div class="skeleton skeleton-image"></div>
    </div>

    <!-- Skeleton 2 -->
    <div class="skeleton-card" id="skel2">
      <div class="skeleton-header">
        <div class="skeleton skeleton-avatar"></div>
        <div class="skeleton-text">
          <div class="skeleton skeleton-line" style="width:55%"></div>
          <div class="skeleton skeleton-line" style="width:35%"></div>
        </div>
      </div>
      <div class="skeleton skeleton-line" style="width:90%"></div>
      <div class="skeleton skeleton-line" style="width:70%;margin-bottom:12px"></div>
      <div class="skeleton skeleton-image" style="height:180px"></div>
    </div>

    <!-- Posts insertados dinámicamente por Home.js -->

  </div>

</main>

<!-- ═══════════════════════ BOTTOM NAV ═══════════════════════ -->
<nav class="bottom-nav">

  <button class="bottom-tab active">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
  </button>

  <button class="bottom-tab" onclick="location.href='shorts.html'">
    <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
  </button>

  <button class="bottom-tab" onclick="location.href='create-posts.html'">
    <div class="tab-special">
      <svg viewBox="0 0 24 24" style="width:22px;height:22px">
        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
      </svg>
    </div>
  </button>

  <button class="bottom-tab" onclick="location.href='chats.html'" style="position:relative">
    <svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/></svg>
    <span class="bottom-tab-badge" id="chatBadge" style="display:none">5</span>
  </button>

  <button class="bottom-tab" onclick="location.href='Profile.html'">
    <svg viewBox="0 0 24 24"><path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5z"/></svg>
  </button>

</nav>

<!-- ═══════════════════════ STORY VIEWER ═══════════════════════ -->
<div class="story-overlay" id="storyOverlay">

  <div class="story-progress" id="storyProgress"></div>

  <div class="story-top">
    <img src="" class="story-user-avatar" id="storyUserAvatar" alt="Autor" />
    <span class="story-user-name" id="storyUserName"></span>
    <span class="story-time"      id="storyUserTime"></span>
    <button class="story-close"   id="storyCloseBtn">
      <svg viewBox="0 0 24 24">
        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </button>
  </div>

  <div class="story-media" id="storyMedia"></div>

  <div class="story-tap-zone story-tap-prev" id="storyTapPrev"></div>
  <div class="story-tap-zone story-tap-next" id="storyTapNext"></div>

</div>

<!-- ═══════════════════════ COMMENT SHEET ═══════════════════════ -->
<div class="comment-sheet-overlay" id="commentSheet">
  <div class="comment-sheet">

    <div class="comment-sheet-handle"></div>
    <div class="comment-sheet-title">Comentarios</div>

    <div class="comment-sheet-list" id="commentList">
      <div style="text-align:center;color:var(--text-secondary);padding:24px;font-size:14px">
        Cargando comentarios…
      </div>
    </div>

    <div class="comment-sheet-input">
      <img src="" id="commentInputAvatar" alt="Tú"
           style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0" />
      <input type="text" id="commentInput" placeholder="Escribe un comentario…" />
      <button class="comment-send-btn" id="commentSendBtn">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>

  </div>
</div>

<!-- ═══════════════════════ TOAST ═══════════════════════ -->
<div class="toast-container" id="toastContainer"></div>

<!-- ═══════════════════════ SCRIPT (ES Module) ═══════════════════════ -->
<script type="module" src="../logicas/Home.js"></script>

</body>
</html>
