<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapBook | Iniciar sesión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            background: #0a0a12;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* BACKGROUND BLOBS */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
        }
        .blob-1 { width: 320px; height: 320px; background: #1877f2; top: -80px; left: -80px; animation: float1 8s ease-in-out infinite; }
        .blob-2 { width: 260px; height: 260px; background: #ff6584; bottom: -60px; right: -60px; animation: float2 10s ease-in-out infinite; }
        .blob-3 { width: 180px; height: 180px; background: #6c63ff; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: float3 7s ease-in-out infinite; }
        @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }
        @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }
        @keyframes float3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.2)} }

        /* NOISE TEXTURE */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 36px 28px 32px;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            position: relative;
            z-index: 1;
            animation: slideUp 0.5s cubic-bezier(0.4,0,0.2,1) forwards;
        }
        @keyframes slideUp { from{opacity:0;transform:translateY(32px)} to{opacity:1;transform:translateY(0)} }

        /* LOGO */
        .logo-wrap { text-align: center; margin-bottom: 28px; }
        .logo {
            font-size: 34px; font-weight: 800; letter-spacing: -1px;
            background: linear-gradient(135deg, #1877f2, #ff6584);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
        }
        .logo-tagline { color: rgba(255,255,255,0.45); font-size: 13px; margin-top: 4px; }

        /* TITLE */
        .card-title { color: white; font-size: 22px; font-weight: 800; margin-bottom: 6px; }
        .card-sub { color: rgba(255,255,255,0.45); font-size: 14px; margin-bottom: 26px; }

        /* FORM */
        .field { margin-bottom: 14px; }
        .field label { display: block; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }
        .input-wrap { position: relative; }
        .input-wrap i {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,0.3); font-size: 15px; pointer-events: none;
        }
        .input-wrap .eye-btn {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,0.3); font-size: 15px; cursor: pointer;
            background: none; border: none; padding: 4px;
        }
        .field input {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 13px 14px 13px 42px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        .field input::placeholder { color: rgba(255,255,255,0.25); }
        .field input:focus { border-color: rgba(24,119,242,0.6); background: rgba(255,255,255,0.08); }
        .field input.has-eye { padding-right: 44px; }

        /* ERROR */
        .error-msg {
            background: rgba(255,101,132,0.12);
            border: 1px solid rgba(255,101,132,0.25);
            border-radius: 12px;
            padding: 10px 14px;
            color: #ff8fa3;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 14px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .error-msg.visible { display: flex; }

        /* FORGOT */
        .forgot-wrap { text-align: right; margin-bottom: 20px; }
        .forgot-link { color: rgba(24,119,242,0.8); font-size: 13px; font-weight: 600; cursor: pointer; background: none; border: none; font-family: inherit; }
        .forgot-link:hover { color: #1877f2; }

        /* SUBMIT */
        .submit-btn {
            width: 100%;
            padding: 15px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #1877f2, #6c63ff);
            color: white;
            font-size: 16px;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .submit-btn::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15));
        }
        .submit-btn:active { transform: scale(0.97); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .submit-btn .spinner { display: none; width: 20px; height: 20px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
        .submit-btn.loading .btn-text { display: none; }
        .submit-btn.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* DIVIDER */
        .divider { display: flex; align-items: center; gap: 12px; margin: 22px 0; }
        .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
        .divider-text { color: rgba(255,255,255,0.3); font-size: 12px; font-weight: 600; }

        /* GOOGLE */
        .google-btn {
            width: 100%;
            padding: 13px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .google-btn:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }
        .google-icon { width: 20px; height: 20px; }

        /* FOOTER */
        .card-footer { text-align: center; margin-top: 24px; color: rgba(255,255,255,0.35); font-size: 14px; }
        .card-footer a { color: #1877f2; font-weight: 700; cursor: pointer; text-decoration: none; }
        .card-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="card">
        <div class="logo-wrap">
            <div class="logo">SnapBook</div>
            <div class="logo-tagline">Comparte tus mejores momentos ✨</div>
        </div>

        <div class="card-title">Bienvenido de vuelta</div>
        <div class="card-sub">Inicia sesión para continuar</div>

        <div class="error-msg" id="error-msg">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span id="error-text">Error al iniciar sesión</span>
        </div>

        <div class="field">
            <label>Correo electrónico</label>
            <div class="input-wrap">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email">
            </div>
        </div>

        <div class="field">
            <label>Contraseña</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Tu contraseña" class="has-eye" autocomplete="current-password">
                <button class="eye-btn" id="eye-btn" tabindex="-1">
                    <i class="fa-regular fa-eye" id="eye-icon"></i>
                </button>
            </div>
        </div>

        <div class="forgot-wrap">
            <button class="forgot-link" id="forgot-btn">¿Olvidaste tu contraseña?</button>
        </div>

        <button class="submit-btn" id="login-btn">
            <span class="btn-text">Iniciar sesión</span>
            <div class="spinner"></div>
        </button>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">O continúa con</div>
            <div class="divider-line"></div>
        </div>

        <button class="google-btn" id="google-btn">
            <svg class="google-icon" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.6 32.6 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/>
                <path fill="#FF3D00" d="m6.3 14.7 6.6 4.8C14.5 16 19 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
                <path fill="#4CAF50" d="M24 44c5.2 0 9.8-1.9 13.4-5.1l-6.2-5.2C29.2 35.3 26.7 36 24 36c-5.2 0-9.5-3.3-11.2-8l-6.5 5C9.7 39.6 16.3 44 24 44z"/>
                <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.2 5.2C37 38 44 33 44 24c0-1.3-.1-2.7-.4-3.9z"/>
            </svg>
            Continuar con Google
        </button>

        <div class="card-footer">
            ¿No tienes cuenta? <a href="register.html">Regístrate gratis</a>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import {
            onAuthStateChanged,
            signInWithEmailAndPassword,
            sendPasswordResetEmail,
            GoogleAuthProvider,
            signInWithPopup
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { ref as dRef, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Guarda perfil de Google en DB solo si es usuario nuevo
        async function saveGoogleUserToDB(user) {
            const snap = await get(dRef(db, `usuarios/${user.uid}`));
            if (!snap.exists()) {
                await set(dRef(db, `usuarios/${user.uid}`), {
                    nombre: user.displayName || user.email.split('@')[0],
                    email: user.email || '',
                    photoURL: user.photoURL || '',
                    createdAt: Date.now()
                });
            }
        }

        // If already logged in, redirect
        onAuthStateChanged(auth, user => {
            if (user) location.href = 'Home.html';
        });

        // Show/hide password
        const passInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
        document.getElementById('eye-btn').onclick = () => {
            const show = passInput.type === 'password';
            passInput.type = show ? 'text' : 'password';
            eyeIcon.className = show ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
        };

        // Show error
        function showError(msg) {
            const el = document.getElementById('error-msg');
            document.getElementById('error-text').textContent = msg;
            el.classList.add('visible');
        }
        function hideError() { document.getElementById('error-msg').classList.remove('visible'); }

        // Error messages in Spanish
        function getErrorMsg(code) {
            const map = {
                'auth/user-not-found': 'No existe una cuenta con ese correo.',
                'auth/wrong-password': 'Contraseña incorrecta.',
                'auth/invalid-email': 'El correo no es válido.',
                'auth/too-many-requests': 'Demasiados intentos. Intenta más tarde.',
                'auth/invalid-credential': 'Correo o contraseña incorrectos.',
                'auth/network-request-failed': 'Sin conexión a internet.',
            };
            return map[code] || 'Error al iniciar sesión. Intenta de nuevo.';
        }

        // Login
        const loginBtn = document.getElementById('login-btn');
        loginBtn.onclick = async () => {
            hideError();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) { showError('Completa todos los campos.'); return; }
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                location.href = 'Home.html';
            } catch (err) {
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
                showError(getErrorMsg(err.code));
            }
        };

        // Enter key
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') loginBtn.click();
        });

        // Forgot password
        document.getElementById('forgot-btn').onclick = async () => {
            const email = document.getElementById('email').value.trim();
            if (!email) { showError('Escribe tu correo primero para restablecer la contraseña.'); return; }
            try {
                await sendPasswordResetEmail(auth, email);
                hideError();
                alert('✅ Correo de restablecimiento enviado. Revisa tu bandeja.');
            } catch(err) {
                showError(getErrorMsg(err.code));
            }
        };

        // Google sign in
        document.getElementById('google-btn').onclick = async () => {
            hideError();
            try {
                const provider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, provider);
                // Guardar nombre y foto de Google automaticamente si es usuario nuevo
                await saveGoogleUserToDB(result.user);
                location.href = 'Home.html';
            } catch(err) {
                if (err.code !== 'auth/popup-closed-by-user') showError(getErrorMsg(err.code));
            }
        };
    </script>
</body>
</html>
