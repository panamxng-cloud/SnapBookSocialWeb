<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapBook | Iniciar sesión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            background: #0a0a12;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* BACKGROUND BLOBS */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
        }
        .blob-1 { width: 320px; height: 320px; background: #1877f2; top: -80px; left: -80px; animation: float1 8s ease-in-out infinite; }
        .blob-2 { width: 260px; height: 260px; background: #ff6584; bottom: -60px; right: -60px; animation: float2 10s ease-in-out infinite; }
        .blob-3 { width: 180px; height: 180px; background: #6c63ff; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: float3 7s ease-in-out infinite; }
        @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }
        @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }
        @keyframes float3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.2)} }

        /* NOISE TEXTURE */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 36px 28px 32px;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            position: relative;
            z-index: 1;
            animation: slideUp 0.5s cubic-bezier(0.4,0,0.2,1) forwards;
        }
        @keyframes slideUp { from{opacity:0;transform:translateY(32px)} to{opacity:1;transform:translateY(0)} }

        /* LOGO */
        .logo-wrap { text-align: center; margin-bottom: 28px; }
        .logo {
            font-size: 34px; font-weight: 800; letter-spacing: -1px;
            background: linear-gradient(135deg, #1877f2, #ff6584);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
        }
        .logo-tagline { color: rgba(255,255,255,0.45); font-size: 13px; margin-top: 4px; }

        /* TITLE */
        .card-title { color: white; font-size: 22px; font-weight: 800; margin-bottom: 6px; }
        .card-sub { color: rgba(255,255,255,0.45); font-size: 14px; margin-bottom: 26px; }

        /* FORM */
        .field { margin-bottom: 14px; }
        .field label { display: block; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }
        .input-wrap { position: relative; }
        .input-wrap i {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,0.3); font-size: 15px; pointer-events: none;
        }
        .input-wrap .eye-btn {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,0.3); font-size: 15px; cursor: pointer;
            background: none; border: none; padding: 4px;
        }
        .field input {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 13px 14px 13px 42px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        .field input::placeholder { color: rgba(255,255,255,0.25); }
        .field input:focus { border-color: rgba(24,119,242,0.6); background: rgba(255,255,255,0.08); }
        .field input.has-eye { padding-right: 44px; }

        /* ERROR */
        .error-msg {
            background: rgba(255,101,132,0.12);
            border: 1px solid rgba(255,101,132,0.25);
            border-radius: 12px;
            padding: 10px 14px;
            color: #ff8fa3;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 14px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .error-msg.visible { display: flex; }

        /* FORGOT */
        .forgot-wrap { text-align: right; margin-bottom: 20px; }
        .forgot-link { color: rgba(24,119,242,0.8); font-size: 13px; font-weight: 600; cursor: pointer; background: none; border: none; font-family: inherit; }
        .forgot-link:hover { color: #1877f2; }

        /* SUBMIT */
        .submit-btn {
            width: 100%;
            padding: 15px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #1877f2, #6c63ff);
            color: white;
            font-size: 16px;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .submit-btn::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15));
        }
        .submit-btn:active { transform: scale(0.97); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .submit-btn .spinner { display: none; width: 20px; height: 20px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
        .submit-btn.loading .btn-text { display: none; }
        .submit-btn.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* DIVIDER */
        .divider { display: flex; align-items: center; gap: 12px; margin: 22px 0; }
        .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
        .divider-text { color: rgba(255,255,255,0.3); font-size: 12px; font-weight: 600; }

        /* GOOGLE */
        .google-btn {
            width: 100%;
            padding: 13px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .google-btn:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }
        .google-icon { width: 20px; height: 20px; }

        /* FOOTER */
        .card-footer { text-align: center; margin-top: 24px; color: rgba(255,255,255,0.35); font-size: 14px; }
        .card-footer a { color: #1877f2; font-weight: 700; cursor: pointer; text-decoration: none; }
        .card-footer a:hover { text-decoration: underline; }

        /* AUTH TABS */
        .auth-tabs { display: flex; background: rgba(255,255,255,0.05); border-radius: 14px; padding: 4px; margin-bottom: 22px; gap: 4px; }
        .auth-tab { flex: 1; padding: 10px; border-radius: 10px; border: none; background: none; color: rgba(255,255,255,0.4); font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .auth-tab.active { background: rgba(255,255,255,0.12); color: white; }
        .auth-tab i { font-size: 13px; }

        /* PHONE PANEL */
        .phone-panel { display: none; }
        .phone-panel.active { display: block; }
        .email-panel { display: block; }
        .email-panel.hidden { display: none; }

        /* PHONE INPUT ROW */
        .phone-row { display: flex; gap: 8px; }
        .country-select { width: 90px; flex-shrink: 0; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; color: white; font-family: inherit; font-size: 14px; font-weight: 700; padding: 0 10px; cursor: pointer; outline: none; appearance: none; -webkit-appearance: none; text-align: center; }
        .country-select option { background: #1a1a2e; color: white; }
        .phone-row .input-wrap { flex: 1; }

        /* OTP BOX */
        .otp-section { display: none; }
        .otp-section.visible { display: block; }
        .otp-hint { font-size: 13px; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 16px; line-height: 1.5; }
        .otp-hint strong { color: white; }
        .otp-inputs { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; }
        .otp-input { width: 46px; height: 54px; border-radius: 14px; border: 1.5px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.07); color: white; font-size: 22px; font-weight: 800; font-family: inherit; text-align: center; outline: none; transition: border-color 0.2s; caret-color: #1877f2; }
        .otp-input:focus { border-color: #1877f2; background: rgba(24,119,242,0.1); }
        .otp-resend { text-align: center; font-size: 13px; color: rgba(255,255,255,0.35); }
        .otp-resend button { background: none; border: none; color: #1877f2; font-weight: 700; font-family: inherit; font-size: 13px; cursor: pointer; }
        .otp-resend button:disabled { color: rgba(255,255,255,0.25); cursor: not-allowed; }
        #recaptcha-container { margin: 0 auto 12px; display: flex; justify-content: center; }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="card">
        <div class="logo-wrap">
            <div class="logo">SnapBook</div>
            <div class="logo-tagline">Comparte tus mejores momentos ✨</div>
        </div>

        <div class="card-title">Bienvenido de vuelta</div>
        <div class="card-sub">Inicia sesión para continuar</div>

        <!-- TABS -->
        <div class="auth-tabs">
            <button class="auth-tab active" id="tab-email" onclick="switchTab('email')">
                <i class="fa-solid fa-envelope"></i> Correo
            </button>
            <button class="auth-tab" id="tab-phone" onclick="switchTab('phone')">
                <i class="fa-solid fa-mobile-screen"></i> Teléfono
            </button>
        </div>

        <div class="error-msg" id="error-msg">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span id="error-text">Error al iniciar sesión</span>
        </div>

        <!-- EMAIL PANEL -->
        <div class="email-panel" id="email-panel">
        <div class="field">
            <label>Correo electrónico</label>
            <div class="input-wrap">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email">
            </div>
        </div>

        <div class="field">
            <label>Contraseña</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Tu contraseña" class="has-eye" autocomplete="current-password">
                <button class="eye-btn" id="eye-btn" tabindex="-1">
                    <i class="fa-regular fa-eye" id="eye-icon"></i>
                </button>
            </div>
        </div>

        <div class="forgot-wrap">
            <button class="forgot-link" id="forgot-btn">¿Olvidaste tu contraseña?</button>
        </div>

        <button class="submit-btn" id="login-btn">
            <span class="btn-text">Iniciar sesión</span>
            <div class="spinner"></div>
        </button>
        </div><!-- end email-panel -->

        <!-- PHONE LOGIN PANEL -->
        <div class="phone-panel" id="phone-panel">
            <!-- STEP 1: número -->
            <div id="phone-step1">
                <div class="field">
                    <label>Número de teléfono</label>
                    <div class="phone-row">
                        <select class="country-select" id="country-code">
                            <option value="+52">🇲🇽 +52</option>
                            <option value="+1">🇺🇸 +1</option>
                            <option value="+34">🇪🇸 +34</option>
                            <option value="+57">🇨🇴 +57</option>
                            <option value="+54">🇦🇷 +54</option>
                            <option value="+51">🇵🇪 +51</option>
                            <option value="+56">🇨🇱 +56</option>
                            <option value="+58">🇻🇪 +58</option>
                            <option value="+593">🇪🇨 +593</option>
                            <option value="+502">🇬🇹 +502</option>
                            <option value="+44">🇬🇧 +44</option>
                            <option value="+55">🇧🇷 +55</option>
                        </select>
                        <div class="input-wrap">
                            <i class="fa-solid fa-mobile-screen"></i>
                            <input type="tel" id="phone-number" placeholder="Ej: 5512345678" autocomplete="tel">
                        </div>
                    </div>
                </div>
                <div id="recaptcha-container"></div>
                <button class="submit-btn" id="send-otp-btn" style="margin-top:4px">
                    <span class="btn-text">Enviar código SMS</span>
                    <div class="spinner"></div>
                </button>
            </div>

            <!-- STEP 2: OTP -->
            <div class="otp-section" id="phone-step2">
                <p class="otp-hint">Código enviado a <strong id="otp-phone-display"></strong><br>Ingresa los 6 dígitos</p>
                <div class="otp-inputs">
                    <input class="otp-input" maxlength="1" type="tel" id="o1">
                    <input class="otp-input" maxlength="1" type="tel" id="o2">
                    <input class="otp-input" maxlength="1" type="tel" id="o3">
                    <input class="otp-input" maxlength="1" type="tel" id="o4">
                    <input class="otp-input" maxlength="1" type="tel" id="o5">
                    <input class="otp-input" maxlength="1" type="tel" id="o6">
                </div>
                <button class="submit-btn" id="verify-otp-btn">
                    <span class="btn-text">Verificar y entrar</span>
                    <div class="spinner"></div>
                </button>
                <div class="otp-resend" style="margin-top:14px">
                    <button id="resend-btn" disabled>Reenviar código (<span id="resend-timer">60</span>s)</button>
                </div>
            </div>
        </div>

        <!-- EMAIL PANEL (existing fields wrapped) -->
        <div class="email-panel" id="email-panel">        </div><!-- end email-panel -->

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">O continúa con</div>
            <div class="divider-line"></div>
        </div>

        <button class="google-btn" id="google-btn">
            <svg class="google-icon" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.6 32.6 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/>
                <path fill="#FF3D00" d="m6.3 14.7 6.6 4.8C14.5 16 19 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
                <path fill="#4CAF50" d="M24 44c5.2 0 9.8-1.9 13.4-5.1l-6.2-5.2C29.2 35.3 26.7 36 24 36c-5.2 0-9.5-3.3-11.2-8l-6.5 5C9.7 39.6 16.3 44 24 44z"/>
                <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.2 5.2C37 38 44 33 44 24c0-1.3-.1-2.7-.4-3.9z"/>
            </svg>
            Continuar con Google
        </button>

        <div class="card-footer">
            ¿No tienes cuenta? <a href="register.html">Regístrate gratis</a>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import {
            onAuthStateChanged,
            signInWithEmailAndPassword,
            sendPasswordResetEmail,
            GoogleAuthProvider,
            signInWithPopup,
            RecaptchaVerifier,
            signInWithPhoneNumber
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { ref as dRef, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ── TAB SWITCH ────────────────────────────────────────────
        window.switchTab = function(tab) {
            const emailPanel = document.getElementById('email-panel');
            const phonePanel = document.getElementById('phone-panel');
            const tabEmail   = document.getElementById('tab-email');
            const tabPhone   = document.getElementById('tab-phone');
            if (tab === 'email') {
                emailPanel.classList.remove('hidden');
                phonePanel.classList.remove('active');
                tabEmail.classList.add('active');
                tabPhone.classList.remove('active');
            } else {
                emailPanel.classList.add('hidden');
                phonePanel.classList.add('active');
                tabEmail.classList.remove('active');
                tabPhone.classList.add('active');
                initRecaptcha();
            }
        };

        // ── PHONE AUTH ─────────────────────────────────────────────
        let confirmationResult = null;
        let recaptchaVerifier  = null;
        let resendInterval     = null;

        function initRecaptcha() {
            if (recaptchaVerifier) return;
            recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                size    : 'normal',
                callback: () => { document.getElementById('send-otp-btn').disabled = false; },
                'expired-callback': () => { recaptchaVerifier = null; initRecaptcha(); }
            });
            recaptchaVerifier.render();
        }

        function startResendTimer() {
            let secs = 60;
            const btn    = document.getElementById('resend-btn');
            const timerEl = document.getElementById('resend-timer');
            btn.disabled = true;
            clearInterval(resendInterval);
            resendInterval = setInterval(() => {
                secs--;
                timerEl.textContent = secs;
                if (secs <= 0) {
                    clearInterval(resendInterval);
                    btn.disabled = false;
                    btn.textContent = 'Reenviar código';
                }
            }, 1000);
        }

        // Send OTP
        document.getElementById('send-otp-btn').onclick = async () => {
            hideError();
            const code  = document.getElementById('country-code').value;
            const num   = document.getElementById('phone-number').value.trim().replace(/\s/g,'');
            if (!num || num.length < 7) { showError('Ingresa un número válido.'); return; }
            const fullPhone = code + num;
            const btn = document.getElementById('send-otp-btn');
            btn.classList.add('loading'); btn.disabled = true;
            try {
                confirmationResult = await signInWithPhoneNumber(auth, fullPhone, recaptchaVerifier);
                document.getElementById('otp-phone-display').textContent = fullPhone;
                document.getElementById('phone-step1').style.display = 'none';
                document.getElementById('phone-step2').classList.add('visible');
                document.getElementById('o1').focus();
                startResendTimer();
            } catch(err) {
                btn.classList.remove('loading'); btn.disabled = false;
                recaptchaVerifier = null; initRecaptcha();
                const msgs = {
                    'auth/invalid-phone-number' : 'Número de teléfono inválido.',
                    'auth/too-many-requests'    : 'Demasiados intentos. Intenta más tarde.',
                    'auth/quota-exceeded'       : 'Límite de SMS alcanzado. Intenta más tarde.',
                };
                showError(msgs[err.code] || 'Error al enviar SMS. Verifica el número.');
            }
        };

        // OTP inputs auto-advance
        ['o1','o2','o3','o4','o5','o6'].forEach((id, i, arr) => {
            const el = document.getElementById(id);
            el.addEventListener('input', () => {
                if (el.value && i < arr.length - 1) document.getElementById(arr[i+1]).focus();
            });
            el.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !el.value && i > 0) document.getElementById(arr[i-1]).focus();
            });
        });

        // Verify OTP
        document.getElementById('verify-otp-btn').onclick = async () => {
            hideError();
            const code = ['o1','o2','o3','o4','o5','o6'].map(id => document.getElementById(id).value).join('');
            if (code.length < 6) { showError('Ingresa los 6 dígitos del código.'); return; }
            const btn = document.getElementById('verify-otp-btn');
            btn.classList.add('loading'); btn.disabled = true;
            try {
                const result = await confirmationResult.confirm(code);
                // Si es usuario nuevo, guardarlo en DB
                const snap = await get(dRef(db, `usuarios/${result.user.uid}`));
                if (!snap.exists()) {
                    await set(dRef(db, `usuarios/${result.user.uid}`), {
                        nombre   : result.user.displayName || 'Usuario',
                        telefono : result.user.phoneNumber || '',
                        photoURL : result.user.photoURL || '',
                        createdAt: Date.now()
                    });
                }
                await redirectSegunPerfil(result.user);
            } catch(err) {
                btn.classList.remove('loading'); btn.disabled = false;
                showError('Código incorrecto o expirado. Intenta de nuevo.');
            }
        };

        // Resend
        document.getElementById('resend-btn').onclick = async () => {
            document.getElementById('phone-step2').classList.remove('visible');
            document.getElementById('phone-step1').style.display = 'block';
            recaptchaVerifier = null;
            document.getElementById('recaptcha-container').innerHTML = '';
            initRecaptcha();
        };

        // ── GUARDA PERFIL GOOGLE ───────────────────────────────────
        // Guarda perfil de Google en DB solo si es usuario nuevo
        async function saveGoogleUserToDB(user) {
            const snap = await get(dRef(db, `usuarios/${user.uid}`));
            if (!snap.exists()) {
                await set(dRef(db, `usuarios/${user.uid}`), {
                    nombre: user.displayName || user.email.split('@')[0],
                    email: user.email || '',
                    photoURL: user.photoURL || '',
                    createdAt: Date.now()
                });
            }
        }

        // Verifica si el usuario tiene foto de perfil, si no → completar perfil
        async function redirectSegunPerfil(user) {
            const snap = await get(dRef(db, `usuarios/${user.uid}`));
            const photoURL = snap.exists() ? (snap.val().photoURL || snap.val().avatar || '') : (user.photoURL || '');
            if (!photoURL) {
                location.href = 'register.html?completar=1';
            } else {
                location.href = 'Home.html';
            }
        }

        // If already logged in, redirect
        onAuthStateChanged(auth, async user => {
            if (user) await redirectSegunPerfil(user);
        });

        // Show/hide password
        const passInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
        document.getElementById('eye-btn').onclick = () => {
            const show = passInput.type === 'password';
            passInput.type = show ? 'text' : 'password';
            eyeIcon.className = show ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
        };

        // Show error
        function showError(msg) {
            const el = document.getElementById('error-msg');
            document.getElementById('error-text').textContent = msg;
            el.classList.add('visible');
        }
        function hideError() { document.getElementById('error-msg').classList.remove('visible'); }

        // Error messages in Spanish
        function getErrorMsg(code) {
            const map = {
                'auth/user-not-found': 'No existe una cuenta con ese correo.',
                'auth/wrong-password': 'Contraseña incorrecta.',
                'auth/invalid-email': 'El correo no es válido.',
                'auth/too-many-requests': 'Demasiados intentos. Intenta más tarde.',
                'auth/invalid-credential': 'Correo o contraseña incorrectos.',
                'auth/network-request-failed': 'Sin conexión a internet.',
            };
            return map[code] || 'Error al iniciar sesión. Intenta de nuevo.';
        }

        // Login
        const loginBtn = document.getElementById('login-btn');
        loginBtn.onclick = async () => {
            hideError();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) { showError('Completa todos los campos.'); return; }
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);
                await redirectSegunPerfil(cred.user);
            } catch (err) {
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
                showError(getErrorMsg(err.code));
            }
        };

        // Enter key
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') loginBtn.click();
        });

        // Forgot password
        document.getElementById('forgot-btn').onclick = async () => {
            const email = document.getElementById('email').value.trim();
            if (!email) { showError('Escribe tu correo primero para restablecer la contraseña.'); return; }
            try {
                await sendPasswordResetEmail(auth, email);
                hideError();
                alert('✅ Correo de restablecimiento enviado. Revisa tu bandeja.');
            } catch(err) {
                showError(getErrorMsg(err.code));
            }
        };

        // Google sign in
        document.getElementById('google-btn').onclick = async () => {
            hideError();
            try {
                const provider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, provider);
                // Guardar nombre y foto de Google automaticamente si es usuario nuevo
                await saveGoogleUserToDB(result.user);
                await redirectSegunPerfil(result.user);
            } catch(err) {
                if (err.code !== 'auth/popup-closed-by-user') showError(getErrorMsg(err.code));
            }
        };
    </script>
</body>
</html>
